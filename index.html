<html lang="en">
<head>
    <meta charset="UTF-8">

<body class="bg-gray-100 dark:bg-gray-950 h-[100dvh] w-screen overflow-hidden flex flex-col antialiased">

<!-- AUTHENTICATION SCREEN -->
<div id="auth-screen" class="fixed inset-0 z-50 bg-gray-50 dark:bg-[#0b141a] flex flex-col p-6 overflow-y-auto justify-center">
    <div class="max-w-md w-full mx-auto bg-white dark:bg-[#1f2c34] rounded-2xl shadow-xl p-6 border border-gray-100 dark:border-[#2a3942] flex flex-col gap-5">
        <div class="text-center">
            <span class="text-4xl">🎓</span>
            <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mt-2">EduChat Mobile</h2>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Mobile Classroom Network Connection</p>
        </div>

        <div class="flex border-b border-gray-200 dark:border-[#2a3942] p-0.5 bg-gray-100 dark:bg-[#111b21] rounded-lg">
            <button id="tab-login" class="flex-1 py-2 text-xs font-semibold rounded-md transition-all bg-white dark:bg-[#202c33] text-gray-800 dark:text-gray-100 shadow-sm">Log In</button>
            <button id="tab-signup" class="flex-1 py-2 text-xs font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400">Sign Up</button>
        </div>
        
        <div class="space-y-4">
            <div id="auth-name-wrapper" class="hidden">
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Full Name</label>
                <input type="text" id="auth-name-input" placeholder="e.g. Alex Rivera" class="w-full bg-gray-100 dark:bg-[#2a3942] text-gray-800 dark:text-gray-100 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-transparent focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Phone Number</label>
                <input type="tel" id="auth-phone-input" placeholder="e.g. 8240330068" class="w-full bg-gray-100 dark:bg-[#2a3942] text-gray-800 dark:text-gray-100 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-transparent focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-mono">
            </div>
            <div id="teacher-password-wrapper" class="hidden">
                <label class="block text-xs font-semibold text-red-500 dark:text-red-400 mb-1">Teacher Security Password</label>
                <input type="password" id="auth-teacher-pass" placeholder="Enter Teacher Credentials Key" class="w-full bg-gray-100 dark:bg-[#2a3942] text-gray-800 dark:text-gray-100 px-4 py-2.5 rounded-xl border border-red-300 dark:border-transparent focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
            </div>

        <div id="auth-error-box" class="hidden p-3 rounded-xl text-xs bg-red-100 dark:bg-red-950/40 text-red-700 dark:text-red-400 border border-red-200 dark:border-transparent flex items-start space-x-2">
            <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
            <span id="auth-error-msg"></span>

        <button id="auth-submit-btn" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold shadow-md active:scale-[0.99] transition-all">Continue to Hub</button>
    </div>
</div>

<!-- MAIN VIEWPORT CONTAINER -->
<div class="flex-1 flex w-full h-full relative overflow-hidden">
    
    <!-- SIDEBAR VIEW -->
    <div id="view-sidebar" class="w-full h-full flex flex-col bg-white dark:bg-[#111b21] z-10">

            <div class="flex items-center space-x-3">
                <img id="my-avatar" src="https://placehold.co/100x100/10b981/ffffff?text=U" class="w-9 h-9 rounded-full object-cover border border-emerald-500">
                <div>
                    <h2 class="font-bold text-gray-800 dark:text-gray-100 text-sm truncate max-w-[140px]" id="my-name-display">---</h2>

            <div class="flex items-center space-x-1.5">

        <div class="bg-blue-50 dark:bg-[#182229] p-3 border-b border-blue-100 dark:border-transparent flex items-center space-x-2 shrink-0">

        <div class="flex-1 overflow-y-auto" id="chat-list-container"></div>

    <!-- CHAT WINDOW VIEW -->
    <div id="view-chat-window" class="fixed inset-0 w-full h-[100dvh] flex flex-col bg-[#efeae2] dark:bg-[#0b141a] chat-bg transform translate-x-full z-20 transition-transform duration-300 pb-[safe-area-inset-bottom]">
        <div class="bg-gray-50 dark:bg-[#202c33] px-3 py-2.5 flex items-center justify-between border-b border-gray-200 dark:border-transparent shrink-0">
            <div class="flex items-center space-x-2 truncate">
                <button id="back-to-sidebar-btn" class="p-2 -ml-1 text-gray-600 dark:text-gray-300 rounded-full text-sm">
                    <i class="fa-solid fa-chevron-left text-base"></i>
                </button>
                <img id="active-partner-avatar" src="https://placehold.co/100x100/3b82f6/ffffff?text=JS" class="w-9 h-9 rounded-full object-cover shadow-sm">
                <div class="truncate">
                    <h3 class="font-semibold text-xs text-gray-800 dark:text-gray-100 truncate" id="active-partner-name">Teacher Portal</h3>
                    <p class="text-[10px] text-gray-500 dark:text-gray-400" id="active-partner-status">Checking connection...</p>

            <div id="teacher-moderator-controls" class="hidden flex items-center space-x-1">

        <!-- CHAT DISPLAY WINDOW -->
        <div class="flex-1 overflow-y-auto p-4 space-y-2.5 flex flex-col shadow-inner" id="message-container"></div>

        <div id="recording-panel" class="hidden bg-gray-50 dark:bg-[#202c33] py-3.5 px-4 flex items-center justify-between border-t border-gray-200 dark:border-transparent shrink-0">

                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                <span class="text-xs font-mono font-bold text-gray-700 dark:text-gray-200" id="recording-timer">00:00</span>
                <span class="text-[11px] text-gray-500">Audio wave live...</span>
            </div>
            <div class="flex items-center space-x-2">
                <button id="discard-voice-btn" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-lg text-xs">Cancel</button>
                <button id="finalize-voice-btn" class="px-3 py-1 bg-emerald-600 text-white rounded-lg text-xs">Send</button>
            </div>
        </div>

        <!-- FILE PREVIEW STRIP BEFORE SENDING -->
        <div id="file-attachment-preview" class="hidden bg-gray-100 dark:bg-[#1f2c34] px-4 py-2 flex items-center justify-between border-t border-gray-200 dark:border-transparent shrink-0">
            <div class="flex items-center space-x-3 truncate">
                <span class="text-xl shrink-0" id="file-type-icon">📄</span>
                <div class="truncate">
                    <p class="text-xs font-semibold text-gray-700 dark:text-gray-200 truncate" id="file-label-name">file.pdf</p>
                    <p class="text-[10px] text-gray-400 font-mono" id="file-label-size">0 KB</p>
                </div>
            </div>
            <button id="drop-file-btn" class="p-1 text-gray-400 hover:text-red-500"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>

        <!-- CHAT INPUT ZONE -->
        <div class="bg-gray-50 dark:bg-[#202c33] px-3 py-3 flex items-center space-x-2 border-t border-gray-200 dark:border-transparent shrink-0 w-full mb-[safe-area-inset-bottom]">
            <div class="relative">
                <button id="toggle-attachment-btn" class="p-2 text-gray-500 dark:text-gray-300 flex items-center justify-center"><i class="fa-solid fa-plus text-base"></i></button>
                
                <div id="mobile-attachment-box" class="hidden absolute bottom-14 left-0 bg-white dark:bg-[#233138] rounded-xl shadow-2xl p-1 border border-gray-200 dark:border-transparent w-40 z-50 flex flex-col">
                    <label class="flex items-center space-x-2 p-2 hover:bg-gray-100 dark:hover:bg-[#374248] rounded-lg cursor-pointer text-gray-700 dark:text-gray-200 text-xs">
                        <i class="fa-solid fa-file-pdf text-indigo-500 text-sm"></i>
                        <span>Document</span>
                        <input type="file" id="input-doc" class="hidden" accept=".pdf,.doc,.docx,.txt">
                    </label>
                    <label class="flex items-center space-x-2 p-2 hover:bg-gray-100 dark:hover:bg-[#374248] rounded-lg cursor-pointer text-gray-700 dark:text-gray-200 text-xs">
                        <i class="fa-solid fa-photo-film text-rose-500 text-sm"></i>
                        <span>Media File</span>
                        <input type="file" id="input-image" class="hidden" accept="image/*,video/*">
                    </label>
                </div>
            </div>

            <div class="flex-1 bg-white dark:bg-[#2a3942] rounded-full px-4 py-1.5 flex items-center border border-gray-100 dark:border-[#374248]">
                <input type="text" id="input-chat-message" placeholder="Type a message..." class="bg-transparent border-none text-sm w-full focus:outline-none text-gray-800 dark:text-gray-100">
            </div>

            <div class="shrink-0 flex items-center justify-center w-9 h-9">
                <button id="action-mic-btn" class="p-2 bg-emerald-600 text-white rounded-full flex items-center justify-center shadow w-8 h-8"><i class="fa-solid fa-microphone text-xs"></i></button>
                <button id="action-send-btn" class="hidden p-2 bg-emerald-600 text-white rounded-full flex items-center justify-center shadow w-8 h-8"><i class="fa-solid fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- INSTAGRAM STYLE IN-APP LIGHTBOX VIEWER (NO DOWNLOAD REQUIRED) -->

    <div class="flex items-center justify-between w-full">
        <span id="lightbox-title" class="text-white text-xs font-medium truncate max-w-[70%]">In-App Media File</span>
        <button id="close-lightbox-btn" class="p-2.5 bg-white/10 hover:bg-white/20 text-white rounded-full transition-all">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>
    </div>
    
    <div class="flex-1 flex items-center justify-center w-full max-h-[80vh] overflow-hidden my-4" id="lightbox-payload-container"></div>

    <div class="text-center w-full pb-4">
        <p id="lightbox-caption" class="text-gray-400 text-[10px] font-mono">Loaded in active memory sandbox</p>
    </div>

<!-- NOTIFICATION ALERTS & TOASTS -->
<div id="live-message-alert" class="fixed top-4 left-4 right-4 md:left-auto md:right-4 md:w-80 z-50 hidden bg-white dark:bg-[#233138] border border-gray-200 dark:border-transparent p-3.5 rounded-xl shadow-2xl flex items-center space-x-3 transform -translate-y-20 transition-transform duration-300 cursor-pointer active:scale-95">
    <img id="alert-sender-avatar" src="https://placehold.co/100x100/10b981/ffffff?text=S" class="w-9 h-9 rounded-full object-cover">
    <div class="flex-1 truncate">
        <h4 class="text-xs font-bold text-gray-800 dark:text-gray-100 truncate" id="alert-sender-name">New Message</h4>
        <p class="text-[11px] text-gray-500 dark:text-gray-300 truncate mt-0.5" id="alert-sender-body">💬 Text body content</p>
    </div>
    <i class="fa-solid fa-chevron-right text-gray-400 text-xs pl-1"></i>
</div>

<div id="mobile-toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-40 hidden bg-gray-900 text-white px-4 py-2.5 rounded-full shadow-lg flex items-center space-x-2 text-xs transition-all duration-200">
    <i id="toast-icon-box" class="fa-solid fa-circle-check text-emerald-400"></i>
    <span id="toast-text-box">Success</span>
</div>

<audio id="audio-player-node" class="hidden"></audio>

<script>
// --- Firebase Setup ---
const firebaseConfig = {
    apiKey: "AIzaSyAUoxKxvJe-3Unxw4XxaUtaQO7kpG9-8j8",
    databaseURL: "https://educhat-3137e-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "educhat-3137e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const TEACHER_RAW = "8240330068";
const TEACHER_E164 = "+91" + TEACHER_RAW;
const TEACHER_PEER_HEX = "educhat-node-" + btoa("91" + TEACHER_RAW).replace(/=/g, "").toLowerCase();

let currentAuthTab = "login";
let activeProfile = null;
let selectedPhone = "";
let selectedPeerID = "";
let selectedName = "";

let globalHistory = [];
let globalBlocks = [];
let registryList = [];
let unreadCounts = {};

let micRecorderObj = null;
let capturedChunks = [];
let timerTracker = null;
let ticksCounter = 0;
let globalAudioStreamRef = null;
let queuedAttachedFile = null;

let pendingAlertPhone = "";
let pendingAlertPeerId = "";
let pendingAlertName = "";

let uiBindingsInitialized = false;
let peerRestartTimer = null;
let outboxRetryTimer = null;

const MAX_DIRECT_PAYLOAD_CHARS = 240000;

const networkState = {
    peer: null,
    peerId: null,
    connections: new Map(),
    connectingPeers: new Set(),
    outbox: [],
    reconnectTimers: new Map(),
    reconnectAttempts: new Map(),
    seenMessageIds: new Set(),
    peerReady: false,
    lastError: null
};

window.addEventListener('load', () => {
    const cachedUser = localStorage.getItem("mob_active_profile");
    const cachedHistory = localStorage.getItem("mob_chat_logs");
    const cachedBlocks = localStorage.getItem("mob_blocked_nodes");
    const cachedRegistry = localStorage.getItem("mob_registered_students");
    const cachedUnreads = localStorage.getItem("mob_unread_counts");

    if (cachedHistory) globalHistory = JSON.parse(cachedHistory);
    if (cachedBlocks) globalBlocks = JSON.parse(cachedBlocks);
    if (cachedRegistry) registryList = JSON.parse(cachedRegistry);
    if (cachedUnreads) unreadCounts = JSON.parse(cachedUnreads);

    const savedOutbox = JSON.parse(localStorage.getItem("mob_network_outbox") || "[]");
    networkState.outbox = Array.isArray(savedOutbox) ? savedOutbox : [];

    const savedSeenIds = JSON.parse(localStorage.getItem("mob_seen_message_ids") || "[]");
    networkState.seenMessageIds = new Set(Array.isArray(savedSeenIds) ? savedSeenIds : []);

    initializeUIBindings();

    if (cachedUser) {
        activeProfile = JSON.parse(cachedUser);
        document.getElementById("auth-screen").classList.add("hidden");
        requestSystemNotificationPermissions();
        spinUpApplication();
    } else {
        document.getElementById("auth-screen").classList.remove("hidden");
        switchAuthTab("login");
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById("view-chat-window").style.height = window.visualViewport.height + 'px';
            if (selectedPhone !== "") {
                document.getElementById("message-container").scrollTop = document.getElementById("message-container").scrollHeight;
            }
        });
    }
});

function requestSystemNotificationPermissions() {
    if ("Notification" in window) {
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }
}

function initializeUIBindings() {
    if (uiBindingsInitialized) return;
    uiBindingsInitialized = true;

    document.getElementById("tab-login").addEventListener("click", () => switchAuthTab("login"));
    document.getElementById("tab-signup").addEventListener("click", () => switchAuthTab("signup"));
    document.getElementById("auth-phone-input").addEventListener("input", (event) => checkForTeacherPhone(event.target));
    document.getElementById("auth-submit-btn").addEventListener("click", handleAuthSubmit);
    document.getElementById("toggle-dark-mode-btn").addEventListener("click", toggleDarkMode);
    document.getElementById("logout-btn").addEventListener("click", logoutUser);
    document.getElementById("back-to-sidebar-btn").addEventListener("click", navigateToSidebar);
    document.getElementById("clear-chat-btn").addEventListener("click", clearCurrentChatLog);
    document.getElementById("block-icon-ui").addEventListener("click", toggleBlockActiveStudent);
    document.getElementById("drop-file-btn").addEventListener("click", dropQueuedFileAttachment);
    document.getElementById("toggle-attachment-btn").addEventListener("click", toggleMobileAttachmentOverlay);
    document.getElementById("input-doc").addEventListener("change", (event) => processFileQueue(event, "doc"));
    document.getElementById("input-image").addEventListener("change", (event) => processFileQueue(event, "media"));
    document.getElementById("input-chat-message").addEventListener("keydown", catchInputEnter);
    document.getElementById("input-chat-message").addEventListener("input", evaluateControlIcons);
    document.getElementById("action-mic-btn").addEventListener("click", triggerVoiceCapture);
    document.getElementById("action-send-btn").addEventListener("click", dispatchOutgoingMessage);
    document.getElementById("discard-voice-btn").addEventListener("click", discardVoiceNote);
    document.getElementById("finalize-voice-btn").addEventListener("click", finalizeAndSendVoiceNote);
    document.getElementById("close-lightbox-btn").addEventListener("click", closeInAppMediaViewer);
    document.getElementById("live-message-alert").addEventListener("click", jumpToIncomingAlertChannel);

    document.getElementById("chat-list-container").addEventListener("click", (event) => {
        const target = event.target.closest("[data-action='launch-thread']");
        if (!target) return;
        launchMobileThread(target.dataset.phone, target.dataset.peerId, target.dataset.name);
    });

    document.getElementById("message-container").addEventListener("click", (event) => {
        const mediaTarget = event.target.closest("[data-action='open-media']");
        if (mediaTarget) {
            openInAppMediaViewer(mediaTarget.dataset.dataUrl, mediaTarget.dataset.mediaType, mediaTarget.dataset.filename);
            return;
        }
        const audioTarget = event.target.closest("[data-action='play-audio']");
        if (audioTarget) {
            playAudioBlobNode(audioTarget.dataset.audioSrc, audioTarget);
        }
    });
}

function switchAuthTab(targetTab) {
    currentAuthTab = targetTab;
    const lBtn = document.getElementById("tab-login");
    const sBtn = document.getElementById("tab-signup");
    const nameField = document.getElementById("auth-name-wrapper");
    const passWrapper = document.getElementById("teacher-password-wrapper");

    if (targetTab === "login") {
        lBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all bg-white dark:bg-[#202c33] text-gray-800 dark:text-gray-100 shadow-sm";
        sBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400";
        nameField.classList.add("hidden");
        checkForTeacherPhone(document.getElementById("auth-phone-input"));
    } else {
        sBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all bg-white dark:bg-[#202c33] text-gray-800 dark:text-gray-100 shadow-sm";
        lBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400";
        nameField.classList.remove("hidden");
        passWrapper.classList.add("hidden");
    }
    document.getElementById("auth-error-box").classList.add("hidden");
}

function checkForTeacherPhone(el) {
    if (currentAuthTab !== "login") return;
    const clean = cleanPhoneInput(el.value);
    const wrapper = document.getElementById("teacher-password-wrapper");
    if (clean === TEACHER_E164) {
        wrapper.classList.remove("hidden");
    } else {
        wrapper.classList.add("hidden");
    }
}

function cleanPhoneInput(raw) {
    let digits = raw.replace(/[\s\(\)\-+]/g, "");
    if (digits.length === 10) digits = "91" + digits;
    return "+" + digits;
}

function handleAuthSubmit() {
    const nameVal = document.getElementById("auth-name-input").value.trim();
    const phoneVal = document.getElementById("auth-phone-input").value.trim();
    const passVal = document.getElementById("auth-teacher-pass").value.trim();
    const errorBox = document.getElementById("auth-error-box");
    const errorTxt = document.getElementById("auth-error-msg");

    if (!phoneVal || (currentAuthTab === "signup" && !nameVal)) {
        errorTxt.innerText = "Please complete all fields.";
        errorBox.classList.remove("hidden");
        return;
    }

    const cleanPhone = cleanPhoneInput(phoneVal);
    const digitsOnly = cleanPhone.replace("+", "");

    if (cleanPhone === TEACHER_E164 && currentAuthTab === "login") {
        if (passVal !== "Teacher123") {
            errorTxt.innerText = "Invalid credentials for Jitendra Swain.";
            errorBox.classList.remove("hidden");
            return;
        }
        activeProfile = { name: "Jitendra Swain", phone: TEACHER_E164, peerId: TEACHER_PEER_HEX, isTeacher: true };
        requestSystemNotificationPermissions();
        saveProfileAndLaunch();
        return;
    }

    if (currentAuthTab === "signup") {
        if (cleanPhone === TEACHER_E164) {
            errorTxt.innerText = "Teacher profiles must sign in via Log In tab.";
            errorBox.classList.remove("hidden");
            return;
        }
        const registered = registryList.some(s => s.phone === cleanPhone);
        if (registered) {
            errorTxt.innerText = "This node number is already registered. Choose Log In.";
            errorBox.classList.remove("hidden");
            return;
        }
        const newPeerId = "educhat-node-" + btoa(digitsOnly).replace(/=/g, "").toLowerCase();
        const freshStudent = { name: nameVal, phone: cleanPhone, peerId: newPeerId, isTeacher: false };
        registryList.push(freshStudent);
        localStorage.setItem("mob_registered_students", JSON.stringify(registryList));
        activeProfile = freshStudent;
        requestSystemNotificationPermissions();
        saveProfileAndLaunch();
    } else {
        const student = registryList.find(s => s.phone === cleanPhone);
        if (!student) {
            const newPeerId = "educhat-node-" + btoa(digitsOnly).replace(/=/g, "").toLowerCase();
            const implicitStudent = { name: "Student " + cleanPhone.slice(-4), phone: cleanPhone, peerId: newPeerId, isTeacher: false };
            registryList.push(implicitStudent);
            localStorage.setItem("mob_registered_students", JSON.stringify(registryList));
            activeProfile = implicitStudent;
        } else {
            activeProfile = student;
        }
        requestSystemNotificationPermissions();
        saveProfileAndLaunch();
    }
}

function saveProfileAndLaunch() {
    localStorage.setItem("mob_active_profile", JSON.stringify(activeProfile));

function mountPeerNodePipelines() {
    clearTimeout(peerRestartTimer);
    clearInterval(outboxRetryTimer);
    if (networkState.peer && !networkState.peer.destroyed && networkState.peer.id === activeProfile.peerId) {
        return;
    }
    startPeerNode();
    outboxRetryTimer = setInterval(() => {
        if (networkState.outbox.length) {
            flushOutbox();
        }
    }, 4000);
    window.addEventListener('online', () => flushOutbox(), { once: true });
}

function startPeerNode() {
    if (!activeProfile) return;
    if (networkState.peer && !networkState.peer.destroyed) {
        return;
    }

    networkState.peer = new Peer(activeProfile.peerId, {
        host: '0.peerjs.com',
        port: 443,
        path: '/',
        secure: true,
        debug: 1,
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    });
    networkState.peerId = activeProfile.peerId;
    console.debug('[network] Peer created:', networkState.peerId);

    networkState.peer.on('open', () => {
        networkState.peerReady = true;
        document.getElementById("node-status").innerText = "🌐 Connection Node Pipeline Operational";
        document.getElementById("node-status").className = "text-[11px] font-bold text-emerald-600 dark:text-emerald-400";
        if (!activeProfile.isTeacher) connectToPeer(TEACHER_PEER_HEX, true);
        flushOutbox();
    });

    networkState.peer.on('connection', (conn) => {
        console.debug('[network] Incoming connection:', conn.peer);
        if (activeProfile.isTeacher && globalBlocks.includes(conn.peer)) {
            setTimeout(() => conn.close(), 200);
            return;
        }
        registerConnection(conn.peer, conn);
        wireConnection(conn);
    });

    networkState.peer.on('error', (error) => {
        networkState.lastError = error;
        const status = document.getElementById("node-status");
        if (error && error.type === 'unavailable-id') {
            status.innerText = "This profile is already open in another tab or device";
            status.className = "text-[11px] font-medium text-rose-600 dark:text-rose-400";
            return;
        }
        if (error && (error.type === 'peer-unavailable' || error.type === 'webrtc')) {
            const partnerStatus = document.getElementById("active-partner-status");
            if (partnerStatus) partnerStatus.innerText = "Offline — messages will send when they return";
            return;
        }
        const reason = error && error.type ? ` (${error.type})` : '';
        status.innerText = `Reconnecting secure link${reason} — messages stay queued`;
        status.className = "text-[11px] font-medium text-amber-600 dark:text-amber-400";
        if (networkState.peer && !networkState.peer.destroyed) {
            scheduleReconnectForPeer();
        }
    });

    networkState.peer.on('disconnected', () => {
        networkState.peerReady = false;
        const status = document.getElementById("node-status");
        status.innerText = "Secure link interrupted — reconnecting";
        status.className = "text-[11px] font-medium text-amber-600 dark:text-amber-400";
        scheduleReconnectForPeer();
    });
}

function scheduleReconnectForPeer() {
    if (networkState.peer && networkState.peer.disconnected && !networkState.peer.destroyed) {
        console.debug('[network] Reconnecting peer');
        clearTimeout(peerRestartTimer);
        peerRestartTimer = setTimeout(() => {
            if (networkState.peer && networkState.peer.disconnected && !networkState.peer.destroyed) {
                networkState.peer.reconnect();
            }
        }, 1500);
    }
}

function registerConnection(remotePeerId, conn) {
    const existing = networkState.connections.get(remotePeerId);
    if (existing && existing !== conn) {
        try { existing.close(); } catch (_) {}
    }
    networkState.connections.set(remotePeerId, conn);
    networkState.connectingPeers.delete(remotePeerId);
}

function connectToPeer(peerId, requestSync = false) {
    if (!peerId || !networkState.peer || networkState.peer.destroyed) return;
    const existingConn = networkState.connections.get(peerId);
    if (existingConn && existingConn.open) {
        if (requestSync) existingConn.send({ type: "sync_request", senderPhone: activeProfile.phone });
        flushOutbox(peerId);
        return;
    }
    if (networkState.connectingPeers.has(peerId)) return;
    if (existingConn) {
        networkState.connections.delete(peerId);
        try { existingConn.close(); } catch (_) {}
    }

    networkState.connectingPeers.add(peerId);
    console.debug('[network] Outgoing connection:', peerId);
    const conn = networkState.peer.connect(peerId, { reliable: true, serialization: 'json' });
    registerConnection(peerId, conn);
    wireConnection(conn);

    conn.on('open', () => {
        networkState.connectingPeers.delete(peerId);
        console.debug('[network] Connection opened:', peerId);
        if (requestSync) conn.send({ type: "sync_request", senderPhone: activeProfile.phone });
        flushOutbox(peerId);
    });

    conn.on('error', (error) => {
        networkState.connectingPeers.delete(peerId);
        networkState.connections.delete(peerId);
        console.debug('[network] Connection error:', peerId, error?.type || error);
        scheduleReconnect(peerId);
    });

    conn.on('close', () => {
        networkState.connectingPeers.delete(peerId);
        if (networkState.connections.get(peerId) === conn) {
            networkState.connections.delete(peerId);
        }
        console.debug('[network] Connection closed:', peerId);
        scheduleReconnect(peerId);
    });
}

function scheduleReconnect(peerId) {
    if (!peerId || networkState.reconnectTimers.has(peerId)) return;
    const attempt = networkState.reconnectAttempts.get(peerId) || 0;
    const delay = Math.min(1000 * Math.pow(2, attempt), 15000);
    networkState.reconnectAttempts.set(peerId, attempt + 1);
    console.debug('[network] Reconnecting:', peerId, 'in', delay + 'ms');
    const timer = setTimeout(() => {
        networkState.reconnectTimers.delete(peerId);
        if (networkState.peer && !networkState.peer.destroyed) {
            connectToPeer(peerId);
        }
    }, delay);
    networkState.reconnectTimers.set(peerId, timer);
}

function wireConnection(conn) {
    const peerId = conn.peer;
    conn.on('data', (payload) => {
        if (payload && payload.type === 'delivery_ack') {
            removeOutboxMessage(payload.id || payload.messageId);
            return;
        }
        if (activeProfile.isTeacher && globalBlocks.includes(peerId)) return;
        ingestIncomingPayload(payload, peerId);
        const ackId = payload && (payload.id || payload.messageId);
        if (ackId) {
            try { conn.send({ type: 'delivery_ack', id: ackId, messageId: ackId }); } catch (_) {}
        }
    });

    conn.on('open', () => {
        console.debug('[network] Connection live:', peerId);
        flushOutbox(peerId);
    });
}

function messageId() {
    return (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`);
}

function persistOutbox() {
    localStorage.setItem('mob_network_outbox', JSON.stringify(networkState.outbox));
    localStorage.setItem('mob_seen_message_ids', JSON.stringify([...networkState.seenMessageIds].slice(-20000)));
}

function enqueueOutgoingMessage(payload, remotePeerId) {
    if (!remotePeerId) return;
    const messageIdValue = payload.id || payload.messageId || messageId();
    if (networkState.seenMessageIds.has(messageIdValue)) return;
    networkState.seenMessageIds.add(messageIdValue);
    const item = { id: messageIdValue, remotePeerId, payload, createdAt: Date.now() };
    networkState.outbox.push(item);
    persistOutbox();
    console.debug('[network] Message queued:', item.id, remotePeerId);
    flushOutbox(remotePeerId);
}

function removeOutboxMessage(messageIdValue) {
    if (!messageIdValue) return;
    const before = networkState.outbox.length;
    networkState.outbox = networkState.outbox.filter(item => {
        const itemId = item.id || item.payload?.id || item.payload?.messageId;
        return itemId !== messageIdValue;
    });
    if (networkState.outbox.length !== before) {
        persistOutbox();
    }
}

function shouldUseFirebaseFallback(payload, conn) {
    if (!payload) return false;
    if (conn && conn.open) return false;
    if (payload.type === 'file' || payload.type === 'voice') {
        return false;
    }
    const serializedLength = JSON.stringify(payload).length;
    return serializedLength > MAX_DIRECT_PAYLOAD_CHARS;
}

function flushOutbox(remotePeerId = null) {
    const targets = remotePeerId ? [remotePeerId] : Array.from(new Set(networkState.outbox.map(item => item.remotePeerId)));
    if (!targets.length) return;

    const remaining = [];
    for (const item of networkState.outbox) {
        const target = item.remotePeerId;
        if (remotePeerId && target !== remotePeerId) {
            remaining.push(item);
            continue;
        }
        const conn = networkState.connections.get(target);
        if (conn && conn.open) {
            try {
                conn.send(item.payload);
                console.debug('[network] Message handed to connection:', item.id, target);
                remaining.push(item);
            } catch (error) {
                remaining.push(item);
                console.debug('[network] Send failed, re-queueing:', item.id, target, error);
                if (!networkState.reconnectTimers.has(target)) {
                    scheduleReconnect(target);
                }
            }
            continue;
        }

        if (shouldUseFirebaseFallback(item.payload, conn)) {
            saveToFirebaseFallback(item.payload, target).then((saved) => {
                if (saved) {
                    removeOutboxMessage(item.id || item.payload?.id || item.payload?.messageId);
                }
            });
        } else {
            remaining.push(item);
            if (!networkState.reconnectTimers.has(target)) {
                scheduleReconnect(target);
            }
        }
    }

    networkState.outbox = remaining;
    persistOutbox();
}

function saveToFirebaseFallback(payload, peerId) {
    if (!db || !peerId || !payload) return Promise.resolve(false);
    return db.ref('queues/' + peerId + '/' + (payload.id || payload.messageId || messageId())).set(payload)
        .then(() => true)
        .catch(() => false);
}

function handleSyncRequest(conn, senderPhone) {
    const relativeHistory = globalHistory.filter(m => m.threadOwner === senderPhone);
    conn.send({ type: "sync_response", history: relativeHistory });
}

function ingestSyncHistory(syncHistory) {
    syncHistory.forEach(item => {
        const exist = globalHistory.some(m => m.timestamp === item.timestamp && m.content === item.content);
        if (!exist) {
            globalHistory.push(item);
        }
    });
    globalHistory.sort((a,b) => a.timestamp - b.timestamp);
    localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
    populateConversationsGrid();
    if (selectedPhone !== "") {
        loadSelectedChatMessages();
    }
}

function ingestIncomingPayload(payload, remotePeerId) {
    if (!payload) return;
    const incomingId = payload.id || payload.messageId || `${payload.senderPhone || remotePeerId}:${payload.timestamp || Date.now()}:${String(payload.content || '').length}`;
    if (networkState.seenMessageIds.has(incomingId)) return;
    networkState.seenMessageIds.add(incomingId);
    persistOutbox();

    const associatedPhone = payload.senderPhone;
    const targetThread = activeProfile.isTeacher ? associatedPhone : TEACHER_E164;

    const messageEnvelope = {
        senderPhone: payload.senderPhone,
        senderName: payload.senderName,
        threadOwner: targetThread,
        content: payload.content,
        type: payload.type || 'text',
        filename: payload.filename || '',
        filesize: payload.filesize || '',
        timestamp: payload.timestamp || Date.now(),
        messageId: incomingId
    };

    globalHistory.push(messageEnvelope);
    localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));

    if (selectedPhone === targetThread) {
        appendSingleMessageUI(messageEnvelope);
        scrollToChatBottom();
    } else {
        unreadCounts[targetThread] = (unreadCounts[targetThread] || 0) + 1;
        localStorage.setItem("mob_unread_counts", JSON.stringify(unreadCounts));
        triggerDeviceBannerAlert(messageEnvelope, targetThread, remotePeerId);
    }
    populateConversationsGrid();
}

function triggerDeviceBannerAlert(env, threadKey, peerId) {
    pendingAlertPhone = threadKey;
    pendingAlertPeerId = peerId;
    pendingAlertName = env.senderName;

    let textBody = env.content;
    if (env.type === 'file') {
        textBody = env.content.startsWith('data:image/') ? "📸 Sent a Photo" : "📄 Sent a document";
    } else if (env.type === 'voice') {
        textBody = "🎙️ Voice Note";
    }

    document.getElementById("alert-sender-avatar").src = activeProfile.isTeacher ? "https://placehold.co/100x100/10b981/ffffff?text=S" : "https://placehold.co/100x100/3b82f6/ffffff?text=JS";
    document.getElementById("alert-sender-name").innerText = env.senderName;
    document.getElementById("alert-sender-body").innerText = textBody;

    const banner = document.getElementById("live-message-alert");
    banner.classList.remove("hidden");
    setTimeout(() => { banner.classList.remove("-translate-y-20"); }, 50);

    if ("Notification" in window && Notification.permission === "granted") {
        new Notification(env.senderName, { body: textBody, icon: "https://placehold.co/100x100/10b981/ffffff?text=E" });
    }

    setTimeout(() => { dismissIncomingAlertBanner(); }, 6000);
}

function dismissIncomingAlertBanner() {
    const banner = document.getElementById("live-message-alert");
    banner.classList.add("-translate-y-20");
    setTimeout(() => { banner.classList.add("hidden"); }, 300);
}

function jumpToIncomingAlertChannel() {
    dismissIncomingAlertBanner();
    if (pendingAlertPhone !== "") {
        launchMobileThread(pendingAlertPhone, pendingAlertPeerId, pendingAlertName);
    }
}

function launchMobileThread(phone, peerId, name) {
    selectedPhone = phone;
    selectedPeerID = peerId;
    selectedName = name;

    unreadCounts[phone] = 0;
    localStorage.setItem("mob_unread_counts", JSON.stringify(unreadCounts));
    populateConversationsGrid();

    document.getElementById("active-partner-avatar").src = phone === TEACHER_E164 ? "https://placehold.co/100x100/3b82f6/ffffff?text=JS" : "https://placehold.co/100x100/10b981/ffffff?text=S";
    document.getElementById("active-partner-name").innerText = name;
    
    const pStatus = document.getElementById("active-partner-status");
    pStatus.innerText = "Verifying link...";
    pStatus.className = "text-[10px] text-gray-500";

    if (activeProfile.isTeacher) {
        document.getElementById("teacher-moderator-controls").classList.remove("hidden");
        const blockBtn = document.getElementById("block-icon-ui");
        if (globalBlocks.includes(peerId)) {
            blockBtn.className = "p-2 text-red-500 text-xs";
            pStatus.innerText = "Blocked from sending content";
        } else {
            blockBtn.className = "p-2 text-gray-500 dark:text-gray-300 text-xs";
            connectToPeer(peerId, false);
        }
    } else {
        document.getElementById("teacher-moderator-controls").classList.add("hidden");
        connectToPeer(peerId, false);
    }

    loadSelectedChatMessages();
    const win = document.getElementById("view-chat-window");
    win.classList.remove("translate-x-full");
}

function loadSelectedChatMessages() {
    const mContainer = document.getElementById("message-container");
    mContainer.innerHTML = "";
    const matches = globalHistory.filter(m => m.threadOwner === selectedPhone);
    
    if (matches.length === 0) {
        mContainer.innerHTML = `
            <div class="my-auto mx-auto text-center max-w-xs p-6 bg-white/70 dark:bg-[#1e2a30]/50 rounded-2xl backdrop-blur">
                <span class="text-3xl">🛡️</span>
                <h4 class="text-xs font-bold text-gray-800 dark:text-gray-200 mt-2">End-to-End Encrypted Tunnel</h4>
                <p class="text-[10px] text-gray-400 mt-1">This channel links directly to your peer's node. Media files and document assets open inside your sandbox without clogging system downloads.</p>
            </div>`;
    } else {
        matches.forEach(msg => appendSingleMessageUI(msg));
    }
    scrollToChatBottom();
}

                <div class="truncate max-w-[150px]">
                    <h4 class="text-xs font-bold text-gray-800 dark:text-gray-200 truncate">${escapeHtml(msg.filename || 'Document')}</h4>
                    <span class="text-[9px] text-gray-400 font-mono">${escapeHtml(msg.filesize || '')}</span>
                </div>
                <i class="fa-solid fa-eye text-gray-400 text-xs shrink-0 pl-1"></i>`;
            preview.appendChild(doc);
        }
        bubble.appendChild(preview);
    } else if (msg.type === "voice") {
        const audioRow = document.createElement("div");
        audioRow.className = "flex items-center space-x-2.5 py-1";
        const playBtn = document.createElement("button");
        playBtn.className = "w-8 h-8 rounded-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white flex items-center justify-center shadow-md transition-all shrink-0";
        playBtn.dataset.action = "play-audio";
        playBtn.dataset.audioSrc = msg.content;
        playBtn.innerHTML = '<i class="fa-solid fa-play text-xs pl-0.5"></i>';
        const bar = document.createElement("div");
        bar.className = "w-32 bg-gray-200 dark:bg-gray-700 h-1.5 rounded-full overflow-hidden relative";
        const fill = document.createElement("div");
        fill.className = "bg-emerald-500 h-full w-0 progress-fill-bar";
        bar.appendChild(fill);
        const label = document.createElement("span");
        label.className = "text-[10px] text-gray-400 font-mono";
        label.textContent = "Audio";
        audioRow.append(playBtn, bar, label);
        bubble.appendChild(audioRow);
    } else {
        const text = document.createElement("p");
        text.className = "text-xs leading-relaxed break-words";
        text.innerHTML = escapeHtml(msg.content || "");
        bubble.appendChild(text);
    }

    const time = document.createElement("span");
    time.className = `block text-[8px] mt-1 text-right ${isMe ? 'text-emerald-200' : 'text-gray-400'} font-mono`;
    time.textContent = parsedTime;
    bubble.appendChild(time);

    bubbleWrap.appendChild(bubble);
    mContainer.appendChild(bubbleWrap);
}

function openInAppMediaViewer(dataUrl, type, filename) {
    const lightbox = document.getElementById("media-lightbox");
    const container = document.getElementById("lightbox-payload-container");
    const title = document.getElementById("lightbox-title");
    title.innerText = filename || "Internal Media Preview";
    container.innerHTML = "";

    if (type === "image") {
        const img = document.createElement("img");
        img.src = dataUrl;
        img.className = "max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl animate-zoom-in";
        container.appendChild(img);
    } else if (type === "video") {
        const video = document.createElement("video");
        video.src = dataUrl;
        video.controls = true;
        video.autoplay = true;
        video.className = "max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl";
        container.appendChild(video);
    } else if (type === "document") {
        if (dataUrl.startsWith("data:application/pdf")) {
            const iframe = document.createElement("iframe");
            iframe.src = dataUrl;
            iframe.className = "w-full h-[70vh] rounded-lg border-none bg-white";
            container.appendChild(iframe);
        } else if (dataUrl.startsWith("data:text/plain")) {
            const rawText = atob(dataUrl.split(",")[1]);
            const txtBox = document.createElement("div");
            txtBox.className = "w-full h-[65vh] bg-gray-900 text-emerald-400 p-4 rounded-lg font-mono text-xs overflow-y-auto select-text whitespace-pre-wrap";
            txtBox.innerText = rawText;
            container.appendChild(txtBox);
        } else {
            container.innerHTML = `
                <div class="text-center text-white space-y-3 p-6 max-w-xs bg-white/5 rounded-2xl backdrop-blur">
                    <span class="text-4xl">📂</span>
                    <h4 class="text-sm font-semibold">${escapeHtml(filename || 'Document')}</h4>
                    <p class="text-[10px] text-gray-400">Office format files must be opened on system applications. Press down to export manually.</p>
                    <a href="${dataUrl}" download="${escapeHtml(filename || 'file')}" class="inline-block mt-4 px-4 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold">Export Offline File</a>
                </div>`;
        }
    }

    lightbox.classList.remove("hidden");
}

function closeInAppMediaViewer() {
    const lightbox = document.getElementById("media-lightbox");
    const container = document.getElementById("lightbox-payload-container");
    lightbox.classList.add("hidden");
    container.innerHTML = "";
}

function playAudioBlobNode(audioDataUrl, playBtn) {
    const player = document.getElementById("audio-player-node");
    const progress = playBtn.nextElementSibling.firstElementChild;
    if (player.src === audioDataUrl && !player.paused) {
        player.pause();
        playBtn.innerHTML = '<i class="fa-solid fa-play text-xs pl-0.5"></i>';
        return;
    }

    document.querySelectorAll(".progress-fill-bar").forEach(el => el.style.width = '0%');
    document.querySelectorAll("button i.fa-pause").forEach(icon => {
        icon.className = "fa-solid fa-play text-xs pl-0.5";
    });

    player.src = audioDataUrl;
    player.play();
    playBtn.innerHTML = '<i class="fa-solid fa-pause text-xs"></i>';

    player.ontimeupdate = () => {
        const pct = (player.currentTime / player.duration) * 100;
        progress.style.width = `${pct}%`;
    };

    player.onended = () => {
        progress.style.width = '0%';
        playBtn.innerHTML = '<i class="fa-solid fa-play text-xs pl-0.5"></i>';
    };
}

function navigateToSidebar() {
    selectedPhone = "";
    selectedPeerID = "";
    selectedName = "";
    const win = document.getElementById("view-chat-window");
    win.classList.add("translate-x-full");
    populateConversationsGrid();
}

function toggleMobileAttachmentOverlay() {
    const box = document.getElementById("mobile-attachment-box");
    box.classList.toggle("hidden");
}

async function processFileQueue(event, type) {
    const file = event.target.files[0];
    if (!file) return;

    const maxBytes = file.type.startsWith("video/") ? 1500 * 1024 : 1024 * 1024;
    if (file.size > maxBytes && !file.type.startsWith("image/")) {
        invokeDeviceToast("File is too large for reliable offline sending (video max 1.5 MB; documents max 1 MB)", true);
        return;
    }

    try {
        let dataUrl;
        let finalSize = file.size;
        if (file.type.startsWith("image/")) {
            const compressed = await compressImageForSending(file);
            dataUrl = compressed.dataUrl;
            finalSize = compressed.size;
        } else {
            dataUrl = await readFileAsDataUrl(file);
        }
        queuedAttachedFile = {
            filename: file.name,
            filesize: formatBytesLabel(finalSize),
            dataUrl
        };

        const preview = document.getElementById("file-attachment-preview");
        preview.classList.remove("hidden");
        document.getElementById("file-label-name").innerText = file.name;
        document.getElementById("file-label-size").innerText = formatBytesLabel(finalSize);
        const icon = document.getElementById("file-type-icon");
        icon.innerText = file.type.startsWith("image/") ? "📸" : file.type.startsWith("video/") ? "🎥" : "📄";
        toggleMobileAttachmentOverlay();
        evaluateControlIcons();
    } catch (error) {
        console.error("file prep failed", error);
        invokeDeviceToast(error && error.message ? error.message : "Could not prepare that file for sending", true);
    }
}

function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("File reading failed"));
        reader.readAsDataURL(file);
    });
}

function formatBytesLabel(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function compressImageForSending(file) {
    const source = await readFileAsDataUrl(file);
    const image = await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = source;
    });
    const longestSide = Math.max(image.width, image.height);
    const scale = Math.min(1, 900 / longestSide);
    const canvas = document.createElement("canvas");
    canvas.width = Math.round(image.width * scale);
    canvas.height = Math.round(image.height * scale);
    canvas.getContext("2d").drawImage(image, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.62);
    const size = Math.round((dataUrl.length - dataUrl.indexOf(',') - 1) * 0.75);
    if (size > 320 * 1024) throw new Error("compressed image is still too large");
    return { dataUrl, size };
}

function dropQueuedFileAttachment() {
    queuedAttachedFile = null;
    document.getElementById("file-attachment-preview").classList.add("hidden");
    document.getElementById("input-doc").value = "";
    document.getElementById("input-image").value = "";
    evaluateControlIcons();
}

function catchInputEnter(e) {
    if (e.key === "Enter") {
        dispatchOutgoingMessage();
    }
}

function evaluateControlIcons() {
    const textVal = document.getElementById("input-chat-message").value.trim();
    const micBtn = document.getElementById("action-mic-btn");
    const sendBtn = document.getElementById("action-send-btn");

    if (textVal !== "" || queuedAttachedFile !== null) {
        micBtn.classList.add("hidden");
        sendBtn.classList.remove("hidden");
    } else {
        sendBtn.classList.add("hidden");
        micBtn.classList.remove("hidden");
    }
}

function dispatchOutgoingMessage() {
    const textVal = document.getElementById("input-chat-message").value.trim();
    if (textVal === "" && queuedAttachedFile === null) return;

    let finalPayload = {};
    const messageKey = messageId();
    
    if (queuedAttachedFile !== null) {
        finalPayload = {
            senderPhone: activeProfile.phone,
            senderName: activeProfile.name,
            content: queuedAttachedFile.dataUrl,
            type: "file",
            filename: queuedAttachedFile.filename,
            filesize: queuedAttachedFile.filesize,
            timestamp: Date.now(),
            id: messageKey,
            messageId: messageKey
        };
        dropQueuedFileAttachment();
    } else {
        finalPayload = {
            senderPhone: activeProfile.phone,
            senderName: activeProfile.name,
            content: textVal,
            type: "text",
            timestamp: Date.now(),
            id: messageKey,
            messageId: messageKey
        };
        document.getElementById("input-chat-message").value = "";
    }

    const localEnvelope = {
        ...finalPayload,
        threadOwner: selectedPhone
    };

    globalHistory.push(localEnvelope);
    localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
    appendSingleMessageUI(localEnvelope);
    scrollToChatBottom();
    evaluateControlIcons();

    enqueueOutgoingMessage(finalPayload, selectedPeerID);
    populateConversationsGrid();
}

function triggerVoiceCapture() {
    if (micRecorderObj && micRecorderObj.state === "recording") {
        finalizeAndSendVoiceNote();
        return;
    }

    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        globalAudioStreamRef = stream;
        micRecorderObj = new MediaRecorder(stream);
        capturedChunks = [];
        
        micRecorderObj.ondataavailable = e => capturedChunks.push(e.data);
        
        micRecorderObj.onstop = () => {
            const audioBlob = new Blob(capturedChunks, { type: 'audio/mp3' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64Audio = reader.result;
                const messageKey = messageId();
                const voicePayload = {
                    senderPhone: activeProfile.phone,
                    senderName: activeProfile.name,
                    content: base64Audio,
                    type: "voice",
                    timestamp: Date.now(),
                    id: messageKey,
                    messageId: messageKey
                };

                const envelope = { ...voicePayload, threadOwner: selectedPhone };
                globalHistory.push(envelope);
                localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
                appendSingleMessageUI(envelope);
                scrollToChatBottom();
                enqueueOutgoingMessage(voicePayload, selectedPeerID);
                populateConversationsGrid();
            };
        };

        micRecorderObj.start();
        document.getElementById("recording-panel").classList.remove("hidden");
        
        ticksCounter = 0;
        document.getElementById("recording-timer").innerText = "00:00";
        timerTracker = setInterval(() => {
            ticksCounter++;
            const m = String(Math.floor(ticksCounter / 60)).padStart(2, '0');
            const s = String(ticksCounter % 60).padStart(2, '0');
            document.getElementById("recording-timer").innerText = `${m}:${s}`;
        }, 1000);
    }).catch(() => {
        invokeDeviceToast("Access to local Microphone refused", true);
    });
}

function finalizeAndSendVoiceNote() {
    if (micRecorderObj) {
        micRecorderObj.stop();
        micRecorderObj = null;
    }
    if (globalAudioStreamRef) {
        globalAudioStreamRef.getTracks().forEach(t => t.stop());
    }
    clearInterval(timerTracker);
    document.getElementById("recording-panel").classList.add("hidden");
}

function discardVoiceNote() {
    if (micRecorderObj) {
        micRecorderObj.onstop = null;
        micRecorderObj.stop();
        micRecorderObj = null;
    }
    if (globalAudioStreamRef) {
        globalAudioStreamRef.getTracks().forEach(t => t.stop());
    }
    clearInterval(timerTracker);
    document.getElementById("recording-panel").classList.add("hidden");
    invokeDeviceToast("Recording deleted", false);
}

function scrollToChatBottom() {
    const container = document.getElementById("message-container");
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
}

function clearCurrentChatLog() {
    if (!confirm("Remove this thread history permanently?")) return;
    globalHistory = globalHistory.filter(m => m.threadOwner !== selectedPhone);
    localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
    loadSelectedChatMessages();
    populateConversationsGrid();
}

function toggleBlockActiveStudent() {
    const index = globalBlocks.indexOf(selectedPeerID);
    const blockBtn = document.getElementById("block-icon-ui");
    
    if (index > -1) {
        globalBlocks.splice(index, 1);
        blockBtn.className = "p-2 text-gray-500 dark:text-gray-300 text-xs";
        invokeDeviceToast("Student pipeline restored", false);
    } else {
        globalBlocks.push(selectedPeerID);
        blockBtn.className = "p-2 text-red-500 text-xs";
        invokeDeviceToast("Student pipeline frozen", true);
    }
    localStorage.setItem("mob_blocked_nodes", JSON.stringify(globalBlocks));
    launchMobileThread(selectedPhone, selectedPeerID, selectedName);
}

function toggleDarkMode() {
    document.documentElement.classList.toggle("dark");
}

function logoutUser() {
    if (!confirm("Log out from local profile? (All offline logs will persist)")) return;
    localStorage.removeItem("mob_active_profile");
    activeProfile = null;
    if (networkState.peer && !networkState.peer.destroyed) {
        networkState.peer.destroy();
        networkState.peer = null;
    }
    clearInterval(outboxRetryTimer);
    networkState.connections.clear();
    networkState.connectingPeers.clear();
    networkState.outbox = [];
    persistOutbox();
    document.getElementById("auth-screen").classList.remove("hidden");
}

function invokeDeviceToast(text, isAlert) {
    const toast = document.getElementById("mobile-toast");
    const box = document.getElementById("toast-text-box");
    const icon = document.getElementById("toast-icon-box");

    box.innerText = text;
    if (isAlert) {
        icon.className = "fa-solid fa-triangle-exclamation text-rose-500";
    } else {
        icon.className = "fa-solid fa-circle-check text-emerald-500";
    }

    toast.classList.remove("hidden");
    setTimeout(() => { toast.classList.add("hidden"); }, 3000);
}

function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return String(text).replace(/[&<>"']/g, m => map[m]);
}

function listenForFirebaseMessages() {
    if (!activeProfile) return;
    const inboxRef = db.ref('queues/' + activeProfile.peerId);
    inboxRef.on('child_added', (snapshot) => {
        const payload = snapshot.val();
        if (payload) {
            ingestIncomingPayload(payload, payload.senderPhone || snapshot.key);
            snapshot.ref.remove();
        }
    });
}
