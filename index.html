<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>EduChat Mobile Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
.chat-bg { background-color: #f0f2f5; background-image: radial-gradient(#dfdfdf 1px, transparent 1px); background-size: 20px 20px; }
</style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 h-[100dvh] w-screen overflow-hidden flex flex-col antialiased">

<script>
/* ---------- Global Variables ---------- */
const TEACHER_RAW = "8240330068";
const TEACHER_E164 = "+91" + TEACHER_RAW;
const TEACHER_PEER_HEX = "educhat-node-" + btoa("91" + TEACHER_RAW).replace(/=/g, "").toLowerCase();

let currentAuthTab = "login";
let activeProfile = null;
let p2pConnection = null;

let selectedPhone = "";
let selectedPeerID = "";
let selectedName = "";

let globalHistory = [];
let globalBlocks = [];
let registryList = [];
let unreadCounts = {};

let micRecorderObj = null;
let capturedChunks = [];
let timerTracker = null;
let ticksCounter = 0;
let globalAudioStreamRef = null;
let queuedAttachedFile = null;

let pendingQueue = JSON.parse(localStorage.getItem("mob_pending_queue") || "[]");
let peerReconnectTimer = null;
let peerInstance = null;
let peerConnected = false;

/* ---------- Utility Functions ---------- */
function savePendingQueue() {
    localStorage.setItem("mob_pending_queue", JSON.stringify(pendingQueue));
}

function scheduleReconnect() {
    clearTimeout(peerReconnectTimer);
    peerReconnectTimer = setTimeout(() => { connectPeer(); }, 3000);
}

// --- Save chat message to local storage ---
function saveMessageToHistory(msg) {
    let history = JSON.parse(localStorage.getItem("mob_chat_logs") || "[]");
    history.push(msg);
    localStorage.setItem("mob_chat_logs", JSON.stringify(history));
    globalHistory = history; // sync global
}

// --- UI Updates ---
function appendSingleMessageUI(msg) {
    const container = document.getElementById("message-container");
    const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const isMe = msg.senderPhone === activeProfile.phone;

    const bubbleWrap = document.createElement("div");
    bubbleWrap.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'} animate-fade-in`;

    let innerHTML = "";
    if (msg.type === "file") {
        if (msg.content.startsWith("data:image/")) {
            innerHTML = `
                <div class="relative max-w-xs rounded-xl overflow-hidden cursor-pointer group" onclick="openInAppMediaViewer('${msg.content}', 'image', '${msg.filename}')">
                    <img src="${msg.content}" class="max-w-full max-h-56 object-cover rounded-xl transition-all group-hover:brightness-90" />
                    <div class="absolute inset-0 bg-black/10 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="bg-black/60 text-white rounded-full p-2 text-xs"><i class="fa-solid fa-expand"></i> View</span>
                    </div>
                </div>`;
        } else if (msg.content.startsWith("data:video/")) {
            innerHTML = `
                <div class="relative max-w-xs rounded-xl overflow-hidden cursor-pointer group" onclick="openInAppMediaViewer('${msg.content}', 'video', '${msg.filename}')">
                    <video src="${msg.content}" class="max-w-full max-h-56 object-cover rounded-xl"></video>
                    <div class="absolute inset-0 bg-black/30 flex items-center justify-center">
                        <span class="bg-emerald-600/90 text-white rounded-full w-10 h-10 flex items-center justify-center shadow"><i class="fa-solid fa-play text-xs"></i></span>
                    </div>
                </div>`;
        } else {
            innerHTML = `
                <div onclick="openInAppMediaViewer('${msg.content}', 'document', '${msg.filename}')" class="flex items-center space-x-3 p-3 bg-gray-50 dark:bg-[#111b21]/70 hover:bg-gray-100 dark:hover:bg-[#111b21] rounded-xl cursor-pointer border border-gray-100 dark:border-transparent transition-all">
                    <div class="w-10 h-10 bg-indigo-100 dark:bg-indigo-950/40 rounded-lg flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-file-pdf text-indigo-500 text-lg"></i>
                    </div>
                    <div class="truncate max-w-[150px]">
                        <h4 class="text-xs font-bold text-gray-800 dark:text-gray-200 truncate">${msg.filename}</h4>
                        <span class="text-[9px] text-gray-400 font-mono">${msg.filesize}</span>
                    </div>
                    <i class="fa-solid fa-eye text-gray-400 text-xs shrink-0 pl-1"></i>
                </div>`;
        }
    } else if (msg.type === "voice") {
        innerHTML = `
            <div class="flex items-center space-x-2.5 py-1">
                <button onclick="playAudioBlobNode('${msg.content}', this)" class="w-8 h-8 rounded-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white flex items-center justify-center shadow-md transition-all"><i class="fa-solid fa-play text-xs"></i></button>
                <div class="w-32 bg-gray-200 dark:bg-gray-700 h-1.5 rounded-full overflow-hidden relative">
                    <div class="bg-emerald-500 h-full w-0 progress-fill-bar"></div>
                </div>
                <span class="text-[10px] text-gray-400 font-mono">Audio</span>
            </div>`;
    } else {
        innerHTML = `<p class="text-xs leading-relaxed break-words">${escapeHtml(msg.content)}</p>`;
    }

    bubbleWrap.innerHTML = innerHTML;
    container.appendChild(bubbleWrap);
}

function scrollToChatBottom() {
    const container = document.getElementById("message-container");
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
}

// --- Media viewer ---
function openInAppMediaViewer(dataUrl, type, filename) {
    const lightbox = document.getElementById("media-lightbox");
    const container = document.getElementById("lightbox-payload-container");
    const title = document.getElementById("lightbox-title");
    title.innerText = filename || "Internal Media Preview";
    container.innerHTML = "";

    if (type === "image") {
        const img = document.createElement("img");
        img.src = dataUrl;
        img.className = "max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl animate-zoom-in";
        container.appendChild(img);
    } else if (type === "video") {
        const video = document.createElement("video");
        video.src = dataUrl;
        video.controls = true;
        video.autoplay = true;
        video.className = "max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl";
        container.appendChild(video);
    } else if (type === "document") {
        if (dataUrl.startsWith("data:application/pdf")) {
            const iframe = document.createElement("iframe");
            iframe.src = dataUrl;
            iframe.className = "w-full h-[70vh] rounded-lg border-none bg-white";
            container.appendChild(iframe);
        } else if (dataUrl.startsWith("data:text/plain")) {
            const rawText = atob(dataUrl.split(",")[1]);
            const txtBox = document.createElement("div");
            txtBox.className = "w-full h-[65vh] bg-gray-900 text-emerald-400 p-4 rounded-lg font-mono text-xs overflow-y-auto select-text whitespace-pre-wrap";
            txtBox.innerText = rawText;
            container.appendChild(txtBox);
        } else {
            // Fallback
            container.innerHTML = `<div class="text-center text-white space-y-3 p-6 max-w-xs bg-white/5 rounded-2xl backdrop-blur">
                <span class="text-4xl">📂</span>
                <h4 class="text-sm font-semibold">${filename}</h4>
                <p class="text-[10px] text-gray-400">Office format files must be opened on system applications. Press down to export manually.</p>
                <a href="${dataUrl}" download="${filename}" class="inline-block mt-4 px-4 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold">Export Offline File</a>
            </div>`;
        }
    }
    lightbox.classList.remove("hidden");
}

function closeInAppMediaViewer() {
    document.getElementById("media-lightbox").classList.add("hidden");
    document.getElementById("lightbox-payload-container").innerHTML = "";
}

function playAudioBlobNode(audioDataUrl, playBtn) {
    const player = document.getElementById("audio-player-node");
    const progress = playBtn.nextElementSibling.querySelector(".progress-fill-bar");

    if (player.src === audioDataUrl && !player.paused) {
        player.pause();
        playBtn.innerHTML = `<i class="fa-solid fa-play text-xs pl-0.5"></i>`;
        return;
    }

    document.querySelectorAll(".progress-fill-bar").forEach(el => el.style.width = '0%');
    document.querySelectorAll("button i.fa-pause").forEach(icon => {
        icon.className = "fa-solid fa-play text-xs pl-0.5";
    });

    player.src = audioDataUrl;
    player.play();
    playBtn.innerHTML = `<i class="fa-solid fa-pause text-xs"></i>`;

    player.ontimeupdate = () => {
        const pct = (player.currentTime / player.duration) * 100;
        progress.style.width = `${pct}%`;
    };
    player.onended = () => {
        progress.style.width = '0%';
        playBtn.innerHTML = `<i class="fa-solid fa-play text-xs pl-0.5"></i>`;
    };
}

// --- Profile & Connection ---
function loadSelectedChatMessages() {
    const container = document.getElementById("message-container");
    container.innerHTML = "";
    const msgs = globalHistory.filter(m => m.threadOwner === selectedPhone);
    if (msgs.length === 0) {
        container.innerHTML = `
        <div class="my-auto mx-auto text-center max-w-xs p-6 bg-white/70 dark:bg-[#1e2a30]/50 rounded-2xl backdrop-blur">
            <span class="text-3xl">🛡️</span>
            <h4 class="text-xs font-bold text-gray-800 dark:text-gray-200 mt-2">End-to-End Encrypted Tunnel</h4>
            <p class="text-[10px] text-gray-400 mt-1">This channel links directly to your peer's node. Media files and document assets open inside your sandbox without clogging system downloads.</p>
        </div>`;
    } else {
        msgs.forEach(msg => appendSingleMessageUI(msg));
    }
    scrollToChatBottom();
}

function connectPeer() {
    if (!selectedPeerID || (p2pConnection && p2pConnection.open)) return;
    try {
        p2pConnection = peerInstance.connect(selectedPeerID, { reliable: true });
        p2pConnection.on("open", () => {
            peerConnected = true;
            document.getElementById("node-status").innerText = "🌐 Connection Node Pipeline Operational";
            document.getElementById("node-status").className = "text-[11px] font-bold text-emerald-600 dark:text-emerald-400";
            // Resync if needed
        });
        p2pConnection.on("close", () => { peerConnected = false; });
        p2pConnection.on("error", () => { peerConnected = false; });
    } catch (e) {
        scheduleReconnect();
    }
}

// --- PeerJS Setup ---
function setupPeer() {
    if (peerInstance) peerInstance.destroy();
    peerInstance = new Peer(activeProfile.peerId, { debug: 1, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
    peerInstance.on('open', () => {
        document.getElementById("node-status").innerText = "🌐 Connection Node Pipeline Operational";
        document.getElementById("node-status").className = "text-[11px] font-bold text-emerald-600 dark:text-emerald-400";

        if (!activeProfile.isTeacher) {
            setTimeout(() => {
                const conn = peerInstance.connect(TEACHER_PEER_HEX, { reliable: true });
                conn.on('open', () => {
                    conn.send({ type: "sync_request", senderPhone: activeProfile.phone });
                });
                conn.on('data', (payload) => {
                    if (payload.type === "sync_response") {
                        ingestSyncHistory(payload.history);
                    }
                });
            }, 1000);
        }
    });
    peerInstance.on('connection', (conn) => {
        if (activeProfile.isTeacher && globalBlocks.includes(conn.peer)) {
            setTimeout(() => conn.close(), 200);
            return;
        }
        p2pConnection = conn;
        conn.on('data', (payload) => {
            if (activeProfile.isTeacher && globalBlocks.includes(p2pConnection.peer)) return;
            if (payload.type === "sync_request") {
                handleSyncRequest(conn, payload.senderPhone);
            } else if (payload.type === "sync_response") {
                ingestSyncHistory(payload.history);
            } else {
                ingestIncomingPayload(payload, conn.peer);
            }
        });
    });
}

// --- Sync & Payload Handling ---
function handleSyncRequest(conn, senderPhone) {
    const historySubset = globalHistory.filter(m => m.threadOwner === senderPhone);
    conn.send({ type: "sync_response", history: historySubset });
}

function ingestSyncHistory(syncHistory) {
    syncHistory.forEach(item => {
        const exists = globalHistory.some(m => m.timestamp === item.timestamp && m.content === item.content);
        if (!exists) globalHistory.push(item);
    });
    globalHistory.sort((a, b) => a.timestamp - b.timestamp);
    localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
    populateConversationsGrid();
    if (selectedPhone !== "") loadSelectedChatMessages();
}

function ingestIncomingPayload(payload, remotePeerId) {
    const targetThread = activeProfile.isTeacher ? payload.senderPhone : TEACHER_E164;
    const messageEnvelope = {
        senderPhone: payload.senderPhone,
        senderName: payload.senderName,
        threadOwner: targetThread,
        content: payload.content,
        type: payload.type || 'text',
        filename: payload.filename || '',
        filesize: payload.filesize || '',
        timestamp: payload.timestamp || Date.now()
    };
    globalHistory.push(messageEnvelope);
    localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
    if (selectedPhone === targetThread) {
        appendSingleMessageUI(messageEnvelope);
        scrollToChatBottom();
    } else {
        unreadCounts[targetThread] = (unreadCounts[targetThread] || 0) + 1;
        localStorage.setItem("mob_unread_counts", JSON.stringify(unreadCounts));
        triggerDeviceBannerAlert(messageEnvelope, targetThread, remotePeerId);
    }
    populateConversationsGrid();
}

// --- Alert Banner ---
function triggerDeviceBannerAlert(env, threadKey, peerId) {
    window.pendingAlertPhone = threadKey;
    window.pendingAlertPeerId = peerId;
    window.pendingAlertName = env.senderName;

    let textBody = env.content;
    if (env.type === 'file') {
        textBody = env.content.startsWith('data:image/') ? "📸 Sent a Photo" :
            env.content.startsWith('data:video/') ? "🎥 Sent a Video" : "📄 Sent a document";
    } else if (env.type === 'voice') {
        textBody = "🎙️ Voice Note";
    }

    document.getElementById("alert-sender-avatar").src = activeProfile.isTeacher ? "https://placehold.co/100x100/10b981/ffffff?text=S" : "https://placehold.co/100x100/3b82f6/ffffff?text=JS";
    document.getElementById("alert-sender-name").innerText = env.senderName;
    document.getElementById("alert-sender-body").innerText = textBody;

    const banner = document.getElementById("live-message-alert");
    banner.classList.remove("hidden");
    setTimeout(() => { banner.classList.remove("-translate-y-20"); }, 50);

    if ("Notification" in window && Notification.permission === "granted") {
        new Notification(env.senderName, { body: textBody, icon: "https://placehold.co/100x100/10b981/ffffff?text=E" });
    }

    setTimeout(() => { dismissIncomingAlertBanner(); }, 6000);
}

function dismissIncomingAlertBanner() {
    const banner = document.getElementById("live-message-alert");
    banner.classList.add("-translate-y-20");
    setTimeout(() => { banner.classList.add("hidden"); }, 300);
}

function jumpToIncomingAlertChannel() {
    dismissIncomingAlertBanner();
    if (window.pendingAlertPhone !== "") {
        launchMobileThread(window.pendingAlertPhone, window.pendingAlertPeerId, window.pendingAlertName);
    }
}

// --- Main Functions ---
function launchMobileThread(phone, peerId, name) {
    selectedPhone = phone;
    selectedPeerID = peerId;
    selectedName = name;

    // Reset unread count
    unreadCounts[phone] = 0;
    localStorage.setItem("mob_unread_counts", JSON.stringify(unreadCounts));

    populateConversationsGrid();

    document.getElementById("active-partner-avatar").src = (phone === TEACHER_E164) ? "https://placehold.co/100x100/3b82f6/ffffff?text=JS" : "https://placehold.co/100x100/10b981/ffffff?text=S";
    document.getElementById("active-partner-name").innerText = name;
    const pStatus = document.getElementById("active-partner-status");
    pStatus.innerText = "Verifying link...";
    pStatus.className = "text-[10px] text-gray-500";

    if (activeProfile.isTeacher) {
        document.getElementById("teacher-moderator-controls").classList.remove("hidden");
        const blockBtn = document.getElementById("block-icon-ui");
        if (globalBlocks.includes(peerId)) {
            blockBtn.className = "p-2 text-red-500 text-xs";
            pStatus.innerText = "Blocked from sending content";
        } else {
            blockBtn.className = "p-2 text-gray-500 dark:text-gray-300 text-xs";
            checkDirectP2PLinkStatus();
        }
    } else {
        document.getElementById("teacher-moderator-controls").classList.add("hidden");
        checkDirectP2PLinkStatus();
    }

    loadSelectedChatMessages();

    const win = document.getElementById("view-chat-window");
    win.classList.remove("translate-x-full");

    connectPeer();
}

function checkDirectP2PLinkStatus() {
    const pStatus = document.getElementById("active-partner-status");
    if (!peerInstance) {
        pStatus.innerText = "Offline";
        return;
    }
    pStatus.innerText = "Attempting Handshake...";
    const conn = peerInstance.connect(selectedPeerID, { reliable: true });
    conn.on('open', () => {
        pStatus.innerText = "Online - Secure Link Active";
        pStatus.className = "text-[10px] text-emerald-600 dark:text-emerald-400 font-bold";
    });
    conn.on('error', () => {
        pStatus.innerText = "Offline - Host unreachable";
        pStatus.className = "text-[10px] text-gray-400";
    });
    setTimeout(() => {
        if (pStatus.innerText === "Attempting Handshake..." || pStatus.innerText === "Verifying link...") {
            pStatus.innerText = "Host dormant (Messages sync on next start)";
            pStatus.className = "text-[10px] text-amber-600 dark:text-amber-400 font-medium";
        }
    }, 3000);
}

// --- Load profile and initialize ---
window.onload = function() {
    const cachedUser = localStorage.getItem("mob_active_profile");
    const cachedHistory = localStorage.getItem("mob_chat_logs");
    const cachedBlocks = localStorage.getItem("mob_blocked_nodes");
    const cachedRegistry = localStorage.getItem("mob_registered_students");
    const cachedUnreads = localStorage.getItem("mob_unread_counts");

    if (cachedHistory) globalHistory = JSON.parse(cachedHistory);
    if (cachedBlocks) globalBlocks = JSON.parse(cachedBlocks);
    if (cachedRegistry) registryList = JSON.parse(cachedRegistry);
    if (cachedUnreads) unreadCounts = JSON.parse(cachedUnreads);

    if (cachedUser) {
        activeProfile = JSON.parse(cachedUser);
        document.getElementById("auth-screen").classList.add("hidden");
        requestSystemNotificationPermissions();
        spinUpApplication();
    } else {
        document.getElementById("auth-screen").classList.remove("hidden");
        switchAuthTab("login");
    }

    // Resize viewport hack
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById("view-chat-window").style.height = window.visualViewport.height + 'px';
            if (selectedPhone !== "") {
                document.getElementById("message-container").scrollTop = document.getElementById("message-container").scrollHeight;
            }
        });
    }
};

/* --- Notification Permissions --- */
function requestSystemNotificationPermissions() {
    if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }
}

/* --- Authentication UI ---
- switchAuthTab, handleAuthSubmit, saveProfileAndLaunch
- These handle login/signup UI and profile setup
- They are unchanged from your code, just make sure they call spinUpApplication() after success
*/

function switchAuthTab(targetTab) {
    currentAuthTab = targetTab;
    const lBtn = document.getElementById("tab-login");
    const sBtn = document.getElementById("tab-signup");
    const nameField = document.getElementById("auth-name-wrapper");
    const passWrapper = document.getElementById("teacher-password-wrapper");
    if (targetTab === "login") {
        lBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all bg-white dark:bg-[#202c33] text-gray-800 dark:text-gray-100 shadow-sm";
        sBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400";
        nameField.classList.add("hidden");
        checkForTeacherPhone(document.getElementById("auth-phone-input"));
    } else {
        sBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all bg-white dark:bg-[#202c33] text-gray-800 dark:text-gray-100 shadow-sm";
        lBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400";
        nameField.classList.remove("hidden");
        passWrapper.classList.add("hidden");
    }
    document.getElementById("auth-error-box").classList.add("hidden");
}

function handleAuthSubmit() {
    const nameVal = document.getElementById("auth-name-input").value.trim();
    const phoneVal = document.getElementById("auth-phone-input").value.trim();
    const passVal = document.getElementById("auth-teacher-pass").value.trim();
    const errorBox = document.getElementById("auth-error-box");
    const errorTxt = document.getElementById("auth-error-msg");

    if (!phoneVal || (currentAuthTab === "signup" && !nameVal)) {
        errorTxt.innerText = "Please complete all fields.";
        errorBox.classList.remove("hidden");
        return;
    }

    const clean = cleanPhoneInput(phoneVal);
    const digitsOnly = clean.replace("+", "");

    if (clean === TEACHER_E164 && currentAuthTab === "login") {
        if (passVal !== "Teacher123") {
            errorTxt.innerText = "Invalid credentials for Jitendra Swain.";
            errorBox.classList.remove("hidden");
            return;
        }
        activeProfile = { name: "Jitendra Swain", phone: TEACHER_E164, peerId: TEACHER_PEER_HEX, isTeacher: true };
        requestSystemNotificationPermissions();
        saveProfileAndLaunch();
        return;
    }

    if (currentAuthTab === "signup") {
        if (clean === TEACHER_E164) {
            errorTxt.innerText = "Teacher profiles must sign in via Log In tab.";
            errorBox.classList.remove("hidden");
            return;
        }
        const registered = registryList.some(s => s.phone === clean);
        if (registered) {
            errorTxt.innerText = "This node number is already registered. Choose Log In.";
            errorBox.classList.remove("hidden");
            return;
        }
        const newPeerId = "educhat-node-" + btoa(digitsOnly).replace(/=/g, "").toLowerCase();
        const newStudent = { name: nameVal, phone: clean, peerId: newPeerId, isTeacher: false };
        registryList.push(newStudent);
        localStorage.setItem("mob_registered_students", JSON.stringify(registryList));
        activeProfile = newStudent;
        requestSystemNotificationPermissions();
        saveProfileAndLaunch();
    } else {
        // Login flow
        const student = registryList.find(s => s.phone === clean);
        if (!student) {
            const newPeerId = "educhat-node-" + btoa(digitsOnly).replace(/=/g, "").toLowerCase();
            const implicitStudent = { name: "Student " + clean.slice(-4), phone: clean, peerId: newPeerId, isTeacher: false };
            registryList.push(implicitStudent);
            localStorage.setItem("mob_registered_students", JSON.stringify(registryList));
            activeProfile = implicitStudent;
        } else {
            activeProfile = student;
        }
        requestSystemNotificationPermissions();
        saveProfileAndLaunch();
    }
}

function saveProfileAndLaunch() {
    localStorage.setItem("mob_active_profile", JSON.stringify(activeProfile));
    document.getElementById("auth-screen").classList.add("hidden");
    spinUpApplication();
}

function spinUpApplication() {
    document.getElementById("my-avatar").src = activeProfile.isTeacher ? "https://placehold.co/100x100/3b82f6/ffffff?text=JS" : "https://placehold.co/100x100/10b981/ffffff?text=S";
    document.getElementById("my-name-display").innerText = activeProfile.name;
    document.getElementById("my-role-badge").innerText = activeProfile.isTeacher ? "Teacher Module" : "Student Module";

    populateConversationsGrid();
    mountPeerNodePipelines();
}

function cleanPhoneInput(raw) {
    let digits = raw.replace(/[\s\(\)\-+]/g, "");
    if (digits.length === 10) digits = "91" + digits;
    return "+" + digits;
}

// --- Populate Conversations ---
function populateConversationsGrid() {
    const listWrapper = document.getElementById("chat-list-container");
    listWrapper.innerHTML = "";

    if (activeProfile.isTeacher) {
        const uniqueStudentsMap = {};

    peerInstance.on('open', () => {
        document.getElementById("node-status").innerText = "🌐 Connection Node Pipeline Operational";

                conn.on('open', () => {
                    conn.send({ type: "sync_request", senderPhone: activeProfile.phone });
                });
                conn.on('data', (payload) => {
                    if (payload.type === "sync_response") {
                        ingestSyncHistory(payload.history);
                    }
                });
            }, 1000);
        }
    });
    peerInstance.on('connection', (conn) => {
        if (activeProfile.isTeacher && globalBlocks.includes(conn.peer)) {
            setTimeout(() => conn.close(), 200);
            return;
        }
        p2pConnection = conn;
        conn.on('data', (payload) => {
            if (activeProfile.isTeacher && globalBlocks.includes(p2pConnection.peer)) return;
            if (payload.type === "sync_request") {
                handleSyncRequest(conn, payload.senderPhone);
            } else if (payload.type === "sync_response") {
                ingestSyncHistory(payload.history);
            } else {
                ingestIncomingPayload(payload, conn.peer);
            }
        });
    });
}

/* --- Send message reliable (queue) ---
call this function to send messages reliably over P2P;
*/
function sendMessageReliable(msg) {
    pendingQueue.push(msg);
    savePendingQueue();
    if (!p2pConnection || !p2pConnection.open) {
        connectPeer();
        return;
    }
    flushPendingQueue();
}

/* --- Flush pending message queue ---
*/
function flushPendingQueue() {
    if (!p2pConnection || !p2pConnection.open) return;
    while (pendingQueue.length > 0) {
        const msg = pendingQueue[0];
        try {
            p2pConnection.send(msg);
            pendingQueue.shift();
        } catch (e) {
            break; // stop on error
        }
    }
    savePendingQueue();
}

/* --- Connect to peer ---
*/
function connectPeer() {
    if (!selectedPeerID || (p2pConnection && p2pConnection.open)) return;
    try {
        p2pConnection = peerInstance.connect(selectedPeerID, { reliable: true });
        p2pConnection.on("open", () => {
            peerConnected = true;
            document.getElementById("node-status").innerText = "🌐 Connected";
        });
        p2pConnection.on("close", () => { peerConnected = false; });
        p2pConnection.on("error", () => { peerConnected = false; });
    } catch (e) {
        scheduleReconnect();
    }
}

// --- Check Peer Connection ---
function checkDirectP2PLinkStatus() {
    const pStatus = document.getElementById("active-partner-status");
    if (!peerInstance) {
        pStatus.innerText = "Offline";
        return;
    }
    pStatus.innerText = "Attempting Handshake...";
    const conn = peerInstance.connect(selectedPeerID, { reliable: true });
    conn.on('open', () => {
        pStatus.innerText = "Online - Secure Link Active";
        pStatus.className = "text-[10px] text-emerald-600 dark:text-emerald-400 font-bold";
    });
    conn.on('error', () => {

    });
    setTimeout(() => {
        if (pStatus.innerText === "Attempting Handshake..." || pStatus.innerText === "Verifying link...") {

// --- UI Event: Send Message ---
function dispatchOutgoingMessage() {
    const messageText = document.getElementById("input-chat-message").value.trim();
    if (messageText === "" && !queuedAttachedFile) return;

    let payload = {
        senderPhone: activeProfile.phone,
        senderName: activeProfile.name,
        timestamp: Date.now(),
        delivered: false
    };

    if (queuedAttachedFile) {
        payload.type = "file";
        payload.filename = queuedAttachedFile.filename;
        payload.filesize = queuedAttachedFile.filesize;
        payload.content = queuedAttachedFile.dataUrl;
        dropQueuedFileAttachment();
    } else {
        payload.type = "text";
        payload.content = messageText;
        document.getElementById("input-chat-message").value = "";
    }

    const localEnvelope = { ...payload, threadOwner: selectedPhone };
    globalHistory.push(localEnvelope);
    localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
    appendSingleMessageUI(localEnvelope);
    scrollToChatBottom();
    evaluateControlIcons();

    if (peerInstance && selectedPeerID) {
        const conn = peerInstance.connect(selectedPeerID, { reliable: true });
        conn.on('open', () => {
            conn.send(payload);
        });
    }

    populateConversationsGrid();
}

// --- Voice Recording ---
function triggerVoiceCapture() {
    if (micRecorderObj && micRecorderObj.state === "recording") {
        finalizeAndSendVoiceNote();
        return;
    }

    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        globalAudioStreamRef = stream;
        micRecorderObj = new MediaRecorder(stream);
        capturedChunks = [];

        micRecorderObj.ondataavailable = e => {
            capturedChunks.push(e.data);
        };

        micRecorderObj.onstop = () => {
            const audioBlob = new Blob(capturedChunks, { type: 'audio/mp3' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64Audio = reader.result;
                const envelope = {
                    senderPhone: activeProfile.phone,
                    senderName: activeProfile.name,
                    content: base64Audio,
                    type: "voice",
                    timestamp: Date.now()
                };
                const msgEnv = { ...envelope, threadOwner: selectedPhone };
                globalHistory.push(msgEnv);
                localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
                appendSingleMessageUI(msgEnv);
                scrollToChatBottom();

                if (peerInstance && selectedPeerID) {
                    const conn = peerInstance.connect(selectedPeerID, { reliable: true });
                    conn.on('open', () => { conn.send(envelope); });
                }
                evaluateControlIcons();
            };
        };

        micRecorderObj.start();
        document.getElementById("recording-panel").classList.remove("hidden");
        ticksCounter = 0;
        document.getElementById("recording-timer").innerText = "00:00";
        timerTracker = setInterval(() => {
            ticksCounter++;
            const m = String(Math.floor(ticksCounter / 60)).padStart(2, '0');
            const s = String(ticksCounter % 60).padStart(2, '0');
            document.getElementById("recording-timer").innerText = `${m}:${s}`;
        }, 1000);
    }).catch(() => {
        invokeDeviceToast("Access to local Microphone refused", true);
    });
}

function finalizeAndSendVoiceNote() {
    if (micRecorderObj) {
        micRecorderObj.stop();
        micRecorderObj = null;
    }
    if (globalAudioStreamRef) {
        globalAudioStreamRef.getTracks().forEach(t => t.stop());
    }
    clearInterval(timerTracker);
    document.getElementById("recording-panel").classList.add("hidden");
}

function discardVoiceNote() {
    if (micRecorderObj) {
        micRecorderObj.onstop = null;
        micRecorderObj.stop();
        micRecorderObj = null;
    }
    if (globalAudioStreamRef) {
        globalAudioStreamRef.getTracks().forEach(t => t.stop());
    }
    clearInterval(timerTracker);
    document.getElementById("recording-panel").classList.add("hidden");
    invokeDeviceToast("Recording deleted", false);
}

// --- File Upload ---
function processFileQueue(event, type) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 15 * 1024 * 1024) {
        invokeDeviceToast("Internal Pipe cap exceeded! (Max size 15MB)", true);
        return;
    }

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => {
        queuedAttachedFile = {
            filename: file.name,
            filesize: formatBytesLabel(file.size),
            dataUrl: reader.result
        };

        // Update preview
        const preview = document.getElementById("file-attachment-preview");
        preview.classList.remove("hidden");
        document.getElementById("file-label-name").innerText = file.name;
        document.getElementById("file-label-size").innerText = formatBytesLabel(file.size);

        const icon = document.getElementById("file-type-icon");
        if (file.type.startsWith("image/")) icon.innerText = "📸";
        else if (file.type.startsWith("video/")) icon.innerText = "🎥";
        else icon.innerText = "📄";

        toggleMobileAttachmentOverlay();
        evaluateControlIcons();
    };
}

function formatBytesLabel(bytes) {
    if (bytes < 1024) return bytes + " Bytes";
    else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    else return (bytes / 1048576).toFixed(1) + " MB";
}

function dropQueuedFileAttachment() {
    queuedAttachedFile = null;
    document.getElementById("file-attachment-preview").classList.add("hidden");
    document.getElementById("input-doc").value = "";
    document.getElementById("input-image").value = "";
    evaluateControlIcons();
}
