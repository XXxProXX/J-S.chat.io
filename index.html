<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EduChat Mobile Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .chat-bg { background-color: #f0f2f5; background-image: radial-gradient(#dfdfdf 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 h-[100dvh] w-screen overflow-hidden flex flex-col antialiased">

    <script>
        // --- PERSISTENCE ENGINE ---
        function saveMessageToHistory(msg) {
            let history = JSON.parse(localStorage.getItem("mob_chat_logs") || "[]");
            history.push(msg);
            localStorage.setItem("mob_chat_logs", JSON.stringify(history));
            globalHistory = history; // Update global variable used by your UI
        }

        // --- UPDATED DISPATCH LOGIC ---
        function dispatchOutgoingMessage() {
            const input = document.getElementById("input-chat-message");
            const content = input.value.trim();
            if (!content) return;

            const msg = {
                threadOwner: selectedPhone,
                content: content,
                type: 'text',
                timestamp: Date.now(),
                senderName: activeProfile.name
            };

            // 1. ALWAYS save locally so it never disappears
            saveMessageToHistory(msg);

            // 2. Attempt P2P Send
            if (p2pConnection && p2pConnection.open) {
                p2pConnection.send(msg);
            } else {
                console.log("Teacher offline: Message saved locally only.");
            }

            input.value = "";
            populateConversationsGrid(); // Refresh your UI
            
            // Auto-scroll logic
            const container = document.getElementById("message-container");
            if(container) container.scrollTop = container.scrollHeight;
        }

        // --- INITIALIZATION ---
        // Ensure that when your app starts, it reloads the history from LocalStorage
        const cachedHistory = localStorage.getItem("mob_chat_logs");
        if (cachedHistory) {
            globalHistory = JSON.parse(cachedHistory);
        }

        // --- ADD THIS TO YOUR PEERJS 'open' EVENT ---
        // This ensures that when the teacher eventually connects, you could potentially
        // re-send messages that were stored while they were offline.
        peerInstance.on('connection', (conn) => {
            p2pConnection = conn;
            console.log("Teacher is back online!");
            // You can add logic here to loop through local history and re-send missing messages
        });
        
        // ... (Keep the rest of your original logic below)
    </script>

    <!-- AUTHENTICATION SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-50 bg-gray-50 dark:bg-[#0b141a] flex flex-col p-6 overflow-y-auto justify-center">
        <div class="max-w-md w-full mx-auto bg-white dark:bg-[#1f2c34] rounded-2xl shadow-xl p-6 border border-gray-100 dark:border-[#2a3942] flex flex-col gap-5">
            <div class="text-center">
                <span class="text-4xl">🎓</span>
                <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mt-2">EduChat Mobile</h2>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Mobile Classroom Network Connection</p>
            </div>

            <div class="flex border-b border-gray-200 dark:border-[#2a3942] p-0.5 bg-gray-100 dark:bg-[#111b21] rounded-lg">
                <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-2 text-xs font-semibold rounded-md transition-all bg-white dark:bg-[#202c33] text-gray-800 dark:text-gray-100 shadow-sm">Log In</button>
                <button onclick="switchAuthTab('signup')" id="tab-signup" class="flex-1 py-2 text-xs font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400">Sign Up</button>
            </div>
            
            <div class="space-y-4">
                <div id="auth-name-wrapper" class="hidden">
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Full Name</label>
                    <input type="text" id="auth-name-input" placeholder="e.g. Alex Rivera" class="w-full bg-gray-100 dark:bg-[#2a3942] text-gray-800 dark:text-gray-100 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-transparent focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Phone Number</label>
                    <input type="tel" id="auth-phone-input" oninput="checkForTeacherPhone(this)" placeholder="e.g. 8240330068" class="w-full bg-gray-100 dark:bg-[#2a3942] text-gray-800 dark:text-gray-100 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-transparent focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-mono">
                </div>
                <div id="teacher-password-wrapper" class="hidden">
                    <label class="block text-xs font-semibold text-red-500 dark:text-red-400 mb-1">Teacher Security Password</label>
                    <input type="password" id="auth-teacher-pass" placeholder="Enter Teacher Credentials Key" class="w-full bg-gray-100 dark:bg-[#2a3942] text-gray-800 dark:text-gray-100 px-4 py-2.5 rounded-xl border border-red-300 dark:border-transparent focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">

            <div id="auth-error-box" class="hidden p-3 rounded-xl text-xs bg-red-100 dark:bg-red-950/40 text-red-700 dark:text-red-400 border border-red-200 dark:border-transparent flex items-start space-x-2">

            <button onclick="handleAuthSubmit()" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold shadow-md active:scale-[0.99] transition-all">Continue to Hub</button>
        </div>

        <!-- SIDEBAR VIEW -->

                    <div class="truncate">

            <!-- CHAT DISPLAY WINDOW -->

                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <span class="text-xs font-mono font-bold text-gray-700 dark:text-gray-200" id="recording-timer">00:00</span>
                    <span class="text-[11px] text-gray-500">Audio wave live...</span>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="discardVoiceNote()" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-lg text-xs">Cancel</button>
                    <button onclick="finalizeAndSendVoiceNote()" class="px-3 py-1 bg-emerald-600 text-white rounded-lg text-xs">Send</button>
                </div>
            </div>

            <!-- FILE PREVIEW STRIP BEFORE SENDING -->
            <div id="file-attachment-preview" class="hidden bg-gray-100 dark:bg-[#1f2c34] px-4 py-2 flex items-center justify-between border-t border-gray-200 dark:border-transparent shrink-0">
                <div class="flex items-center space-x-3 truncate">
                    <span class="text-xl shrink-0" id="file-type-icon">📄</span>
                    <div class="truncate">
                        <p class="text-xs font-semibold text-gray-700 dark:text-gray-200 truncate" id="file-label-name">file.pdf</p>
                        <p class="text-[10px] text-gray-400 font-mono" id="file-label-size">0 KB</p>

                <button onclick="dropQueuedFileAttachment()" class="p-1 text-gray-400 hover:text-red-500"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>

            <!-- CHAT INPUT ZONE -->
            <div class="bg-gray-50 dark:bg-[#202c33] px-3 py-3 flex items-center space-x-2 border-t border-gray-200 dark:border-transparent shrink-0 w-full mb-[safe-area-inset-bottom]">
                <div class="relative">
                    <button onclick="toggleMobileAttachmentOverlay()" class="p-2 text-gray-500 dark:text-gray-300 flex items-center justify-center"><i class="fa-solid fa-plus text-base"></i></button>
                    
                    <div id="mobile-attachment-box" class="hidden absolute bottom-14 left-0 bg-white dark:bg-[#233138] rounded-xl shadow-2xl p-1 border border-gray-200 dark:border-transparent w-40 z-50 flex flex-col">
                        <label class="flex items-center space-x-2 p-2 hover:bg-gray-100 dark:hover:bg-[#374248] rounded-lg cursor-pointer text-gray-700 dark:text-gray-200 text-xs">

                            <span>Document</span>

                            <i class="fa-solid fa-photo-film text-rose-500 text-sm"></i>

                </div>

                <div class="shrink-0 flex items-center justify-center w-9 h-9">
                    <button onclick="triggerVoiceCapture()" id="action-mic-btn" class="p-2 bg-emerald-600 text-white rounded-full flex items-center justify-center shadow w-8 h-8"><i class="fa-solid fa-microphone text-xs"></i></button>
                    <button onclick="dispatchOutgoingMessage()" id="action-send-btn" class="hidden p-2 bg-emerald-600 text-white rounded-full flex items-center justify-center shadow w-8 h-8"><i class="fa-solid fa-paper-plane text-xs"></i></button>

        <img id="alert-sender-avatar" src="https://placehold.co/100x100/10b981/ffffff?text=S" class="w-9 h-9 rounded-full object-cover">
        <div class="flex-1 truncate">
            <h4 class="text-xs font-bold text-gray-800 dark:text-gray-100 truncate" id="alert-sender-name">New Message</h4>
            <p class="text-[11px] text-gray-500 dark:text-gray-300 truncate mt-0.5" id="alert-sender-body">💬 Text body content</p>
        </div>
        <i class="fa-solid fa-chevron-right text-gray-400 text-xs pl-1"></i>

    <div id="mobile-toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-40 hidden bg-gray-900 text-white px-4 py-2.5 rounded-full shadow-lg flex items-center space-x-2 text-xs transition-all duration-200">
        <i id="toast-icon-box" class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toast-text-box">Success</span>
    </div>

    <audio id="audio-player-node" class="hidden"></audio>

    <script>
        const TEACHER_RAW = "8240330068";
        const TEACHER_E164 = "+91" + TEACHER_RAW;
        const TEACHER_PEER_HEX = "educhat-node-" + btoa("91" + TEACHER_RAW).replace(/=/g, "").toLowerCase();

        let currentAuthTab = "login";
        let activeProfile = null;
        let peerInstance = null;
        let p2pConnection = null;

        let selectedPhone = "";
        let selectedPeerID = "";
        let selectedName = "";

        let globalHistory = [];
        let globalBlocks = [];
        let registryList = []; 
        let unreadCounts = {}; 

        let micRecorderObj = null;
        let capturedChunks = [];
        let timerTracker = null;
        let ticksCounter = 0;
        let globalAudioStreamRef = null;
        let queuedAttachedFile = null;

        let pendingAlertPhone = "";
        let pendingAlertPeerId = "";
        let pendingAlertName = "";

        window.onload = function() {
            const cachedUser = localStorage.getItem("mob_active_profile");
            const cachedHistory = localStorage.getItem("mob_chat_logs");
            const cachedBlocks = localStorage.getItem("mob_blocked_nodes");
            const cachedRegistry = localStorage.getItem("mob_registered_students");
            const cachedUnreads = localStorage.getItem("mob_unread_counts");

            if (cachedHistory) globalHistory = JSON.parse(cachedHistory);
            if (cachedBlocks) globalBlocks = JSON.parse(cachedBlocks);
            if (cachedRegistry) registryList = JSON.parse(cachedRegistry);
            if (cachedUnreads) unreadCounts = JSON.parse(cachedUnreads);

            if (cachedUser) {
                activeProfile = JSON.parse(cachedUser);
                document.getElementById("auth-screen").classList.add("hidden");
                requestSystemNotificationPermissions();
                spinUpApplication();
            } else {
                document.getElementById("auth-screen").classList.remove("hidden");
                switchAuthTab("login");
            }

            // Keyboard Viewport Adjustment Hack for mobile browsers
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => {
                    document.getElementById("view-chat-window").style.height = window.visualViewport.height + 'px';
                    if (selectedPhone !== "") {
                        document.getElementById("message-container").scrollTop = document.getElementById("message-container").scrollHeight;
                    }
                });
            }
        };

        function requestSystemNotificationPermissions() {
            if ("Notification" in window) {
                if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }
            }
        }

        function switchAuthTab(targetTab) {
            currentAuthTab = targetTab;
            const lBtn = document.getElementById("tab-login");
            const sBtn = document.getElementById("tab-signup");
            const nameField = document.getElementById("auth-name-wrapper");
            const passWrapper = document.getElementById("teacher-password-wrapper");

            if (targetTab === "login") {
                lBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all bg-white dark:bg-[#202c33] text-gray-800 dark:text-gray-100 shadow-sm";
                sBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400";
                nameField.classList.add("hidden");
                checkForTeacherPhone(document.getElementById("auth-phone-input"));
            } else {
                sBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all bg-white dark:bg-[#202c33] text-gray-800 dark:text-gray-100 shadow-sm";
                lBtn.className = "flex-1 py-2 text-xs font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400";
                nameField.classList.remove("hidden");
                passWrapper.classList.add("hidden"); 
            }
            document.getElementById("auth-error-box").classList.add("hidden");
        }

        function checkForTeacherPhone(el) {
            if (currentAuthTab !== "login") return;
            const clean = cleanPhoneInput(el.value);
            const wrapper = document.getElementById("teacher-password-wrapper");
            if (clean === TEACHER_E164) {
                wrapper.classList.remove("hidden");
            } else {
                wrapper.classList.add("hidden");
            }
        }

        function cleanPhoneInput(raw) {
            let digits = raw.replace(/[\s\(\)\-+]/g, "");
            if (digits.length === 10) digits = "91" + digits;
            return "+" + digits;
        }

        function handleAuthSubmit() {
            const nameVal = document.getElementById("auth-name-input").value.trim();
            const phoneVal = document.getElementById("auth-phone-input").value.trim();
            const passVal = document.getElementById("auth-teacher-pass").value.trim();
            const errorBox = document.getElementById("auth-error-box");
            const errorTxt = document.getElementById("auth-error-msg");

            if (!phoneVal || (currentAuthTab === "signup" && !nameVal)) {
                errorTxt.innerText = "Please complete all fields.";
                errorBox.classList.remove("hidden");
                return;
            }

            const cleanPhone = cleanPhoneInput(phoneVal);
            const digitsOnly = cleanPhone.replace("+", "");

            if (cleanPhone === TEACHER_E164 && currentAuthTab === "login") {
                if (passVal !== "Teacher123") {
                    errorTxt.innerText = "Invalid credentials for Jitendra Swain.";
                    errorBox.classList.remove("hidden");
                    return;
                }
                activeProfile = { name: "Jitendra Swain", phone: TEACHER_E164, peerId: TEACHER_PEER_HEX, isTeacher: true };
                requestSystemNotificationPermissions();
                saveProfileAndLaunch();
                return;
            }

            if (currentAuthTab === "signup") {
                if (cleanPhone === TEACHER_E164) {
                    errorTxt.innerText = "Teacher profiles must sign in via Log In tab.";
                    errorBox.classList.remove("hidden");
                    return;
                }
                const registered = registryList.some(s => s.phone === cleanPhone);
                if (registered) {
                    errorTxt.innerText = "This node number is already registered. Choose Log In.";
                    errorBox.classList.remove("hidden");
                    return;
                }
                const newPeerId = "educhat-node-" + btoa(digitsOnly).replace(/=/g, "").toLowerCase();
                const freshStudent = { name: nameVal, phone: cleanPhone, peerId: newPeerId, isTeacher: false };
                
                registryList.push(freshStudent);
                localStorage.setItem("mob_registered_students", JSON.stringify(registryList));
                activeProfile = freshStudent;
                requestSystemNotificationPermissions();
                saveProfileAndLaunch();
            } else {
                const student = registryList.find(s => s.phone === cleanPhone);
                if (!student) {
                    const newPeerId = "educhat-node-" + btoa(digitsOnly).replace(/=/g, "").toLowerCase();
                    const implicitStudent = { name: "Student " + cleanPhone.slice(-4), phone: cleanPhone, peerId: newPeerId, isTeacher: false };
                    registryList.push(implicitStudent);
                    localStorage.setItem("mob_registered_students", JSON.stringify(registryList));
                    activeProfile = implicitStudent;
                } else {
                    activeProfile = student;
                }
                requestSystemNotificationPermissions();
                saveProfileAndLaunch();
            }
        }

        function saveProfileAndLaunch() {
            localStorage.setItem("mob_active_profile", JSON.stringify(activeProfile));
            document.getElementById("auth-screen").classList.add("hidden");
            spinUpApplication();
        }

        function spinUpApplication() {
            document.getElementById("my-avatar").src = activeProfile.isTeacher ? "https://placehold.co/100x100/3b82f6/ffffff?text=JS" : "https://placehold.co/100x100/10b981/ffffff?text=S";
            document.getElementById("my-name-display").innerText = activeProfile.name;
            document.getElementById("my-role-badge").innerText = activeProfile.isTeacher ? "Teacher Module" : "Student Module";
            populateConversationsGrid();
            mountPeerNodePipelines();
        }

        function populateConversationsGrid() {
            const listWrapper = document.getElementById("chat-list-container");
            listWrapper.innerHTML = "";

            if (activeProfile.isTeacher) {
                const uniqueStudentsMap = {};
                globalHistory.forEach(m => { if (m.threadOwner && m.threadOwner !== TEACHER_E164) uniqueStudentsMap[m.threadOwner] = m.senderName || "Student Log"; });
                registryList.forEach(s => { uniqueStudentsMap[s.phone] = s.name; });

                const structuralKeys = Object.keys(uniqueStudentsMap);
                if (structuralKeys.length === 0) {
                    listWrapper.innerHTML = `<div class="p-8 text-center text-gray-400 text-xs mt-6">Awaiting student synchronization channels...</div>`;
                } else {
                    structuralKeys.forEach(pNum => {
                        const sName = uniqueStudentsMap[pNum];

        function mountPeerNodePipelines() {
            if (peerInstance) peerInstance.destroy();
            peerInstance = new Peer(activeProfile.peerId, { debug: 1, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
            
            peerInstance.on('open', () => {
                document.getElementById("node-status").innerText = "🌐 Connection Node Pipeline Operational";
                document.getElementById("node-status").className = "text-[11px] font-bold text-emerald-600 dark:text-emerald-400";
                
                if (!activeProfile.isTeacher) {
                    setTimeout(() => {
                        const conn = peerInstance.connect(TEACHER_PEER_HEX, { reliable: true });
                        conn.on('open', () => {
                            conn.send({ type: "sync_request", senderPhone: activeProfile.phone });
                        });
                        conn.on('data', (payload) => {
                            if (payload.type === "sync_response") {
                                ingestSyncHistory(payload.history);
                            }
                        });
                    }, 1000);
                }
            });

            peerInstance.on('connection', (conn) => {
                if (activeProfile.isTeacher && globalBlocks.includes(conn.peer)) { setTimeout(() => conn.close(), 200); return; }
                p2pConnection = conn;
                p2pConnection.on('data', (payload) => {
                    if (activeProfile.isTeacher && globalBlocks.includes(p2pConnection.peer)) return;
                    
                    if (payload.type === "sync_request") {
                        handleSyncRequest(conn, payload.senderPhone);
                    } else if (payload.type === "sync_response") {
                        ingestSyncHistory(payload.history);
                    } else {
                        ingestIncomingPayload(payload, conn.peer);
                    }
                });
            });
        }

        function handleSyncRequest(conn, senderPhone) {
            const relativeHistory = globalHistory.filter(m => m.threadOwner === senderPhone);
            conn.send({ type: "sync_response", history: relativeHistory });
        }

        function ingestSyncHistory(syncHistory) {
            syncHistory.forEach(item => {
                const exist = globalHistory.some(m => m.timestamp === item.timestamp && m.content === item.content);
                if (!exist) {
                    globalHistory.push(item);
                }
            });
            globalHistory.sort((a,b) => a.timestamp - b.timestamp);
            localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
            populateConversationsGrid();
            if (selectedPhone !== "") {
                loadSelectedChatMessages();
            }
        }

        function ingestIncomingPayload(payload, remotePeerId) {
            const associatedPhone = payload.senderPhone;
            const targetThread = activeProfile.isTeacher ? associatedPhone : TEACHER_E164;
            
            const messageEnvelope = {
                senderPhone: payload.senderPhone,
                senderName: payload.senderName,
                threadOwner: targetThread,
                content: payload.content,
                type: payload.type || 'text',
                filename: payload.filename || '',
                filesize: payload.filesize || '',
                timestamp: payload.timestamp || Date.now()
            };

            globalHistory.push(messageEnvelope);
            localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));

            if (selectedPhone === targetThread) {
                appendSingleMessageUI(messageEnvelope);
                scrollToChatBottom();
            } else {
                unreadCounts[targetThread] = (unreadCounts[targetThread] || 0) + 1;
                localStorage.setItem("mob_unread_counts", JSON.stringify(unreadCounts));
                triggerDeviceBannerAlert(messageEnvelope, targetThread, remotePeerId);
            }
            populateConversationsGrid();
        }

            conn.on('error', () => {

        function openInAppMediaViewer(dataUrl, type, filename) {
            const lightbox = document.getElementById("media-lightbox");
            const container = document.getElementById("lightbox-payload-container");
            const title = document.getElementById("lightbox-title");
            
            title.innerText = filename || "Internal Media Preview";
            container.innerHTML = ""; // Clear existing sandbox contents
            
            if (type === "image") {
                const img = document.createElement("img");
                img.src = dataUrl;
                img.className = "max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl animate-zoom-in";
                container.appendChild(img);
            } 
            else if (type === "video") {
                const video = document.createElement("video");
                video.src = dataUrl;
                video.controls = true;
                video.autoplay = true;
                video.className = "max-w-full max-h-[75vh] object-contain rounded-lg shadow-2xl";
                container.appendChild(video);
            } 
            else if (type === "document") {
                // Documents preview safely without downloading
                if (dataUrl.startsWith("data:application/pdf")) {
                    const iframe = document.createElement("iframe");
                    iframe.src = dataUrl;
                    iframe.className = "w-full h-[70vh] rounded-lg border-none bg-white";
                    container.appendChild(iframe);
                } else if (dataUrl.startsWith("data:text/plain")) {
                    // Extract text content from the file url and render in box
                    const rawText = atob(dataUrl.split(",")[1]);
                    const txtBox = document.createElement("div");
                    txtBox.className = "w-full h-[65vh] bg-gray-900 text-emerald-400 p-4 rounded-lg font-mono text-xs overflow-y-auto select-text whitespace-pre-wrap";
                    txtBox.innerText = rawText;
                    container.appendChild(txtBox);
                } else {
                    // Fallback visual message for unrenderable word docs
                    container.innerHTML = `
                        <div class="text-center text-white space-y-3 p-6 max-w-xs bg-white/5 rounded-2xl backdrop-blur">
                            <span class="text-4xl">📂</span>

                }
            }

            lightbox.classList.remove("hidden");
        }

        function playAudioBlobNode(audioDataUrl, playBtn) {
            const player = document.getElementById("audio-player-node");
            const progress = playBtn.nextElementSibling.firstElementChild;
            
            // Check if this audio is already playing
            if (player.src === audioDataUrl && !player.paused) {
                player.pause();
                playBtn.innerHTML = `<i class="fa-solid fa-play text-xs pl-0.5"></i>`;
                return;
            }

            // Reset any active players
            document.querySelectorAll(".progress-fill-bar").forEach(el => el.style.width = '0%');
            document.querySelectorAll("button i.fa-pause").forEach(icon => {
                icon.className = "fa-solid fa-play text-xs pl-0.5";
            });

            player.src = audioDataUrl;
            player.play();
            playBtn.innerHTML = `<i class="fa-solid fa-pause text-xs"></i>`;

            player.ontimeupdate = () => {
                const pct = (player.currentTime / player.duration) * 100;
                progress.style.width = `${pct}%`;
            };

            player.onended = () => {
                progress.style.width = '0%';
                playBtn.innerHTML = `<i class="fa-solid fa-play text-xs pl-0.5"></i>`;
            };
        }

        function processFileQueue(event, type) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 15 * 1024 * 1024) { // 15MB P2P Cap
                invokeDeviceToast("Internal Pipe cap exceeded! (Max size 15MB)", true);
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function() {
                queuedAttachedFile = {
                    filename: file.name,
                    filesize: formatBytesLabel(file.size),
                    dataUrl: reader.result
                };

                const preview = document.getElementById("file-attachment-preview");
                preview.classList.remove("hidden");
                
                document.getElementById("file-label-name").innerText = file.name;
                document.getElementById("file-label-size").innerText = formatBytesLabel(file.size);
                
                const icon = document.getElementById("file-type-icon");
                if (file.type.startsWith("image/")) icon.innerText = "📸";
                else if (file.type.startsWith("video/")) icon.innerText = "🎥";
                else icon.innerText = "📄";

                toggleMobileAttachmentOverlay();
                evaluateControlIcons();
            };
        }

        function formatBytesLabel(bytes) {
            if (bytes < 1024) return bytes + " Bytes";
            else if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
            else return (bytes / 1048576).toFixed(1) + " MB";
        }

        function dropQueuedFileAttachment() {
            queuedAttachedFile = null;
            document.getElementById("file-attachment-preview").classList.add("hidden");
            document.getElementById("input-doc").value = "";

            const textVal = document.getElementById("input-chat-message").value.trim();
            const micBtn = document.getElementById("action-mic-btn");
            const sendBtn = document.getElementById("action-send-btn");

            if (textVal !== "" || queuedAttachedFile !== null) {

        function dispatchOutgoingMessage() {
            const textVal = document.getElementById("input-chat-message").value.trim();
            if (textVal === "" && queuedAttachedFile === null) return;

            let finalPayload = {};
            
            if (queuedAttachedFile !== null) {
                finalPayload = {
                    senderPhone: activeProfile.phone,
                    senderName: activeProfile.name,
                    content: queuedAttachedFile.dataUrl,
                    type: "file",
                    filename: queuedAttachedFile.filename,
                    filesize: queuedAttachedFile.filesize,
                    timestamp: Date.now()
                };
                dropQueuedFileAttachment();
            } else {
                finalPayload = {
                    senderPhone: activeProfile.phone,
                    senderName: activeProfile.name,
                    content: textVal,
                    type: "text",
                    timestamp: Date.now()
                };
                document.getElementById("input-chat-message").value = "";
            }

            const localEnvelope = {
                ...finalPayload,
                threadOwner: selectedPhone
            };

            globalHistory.push(localEnvelope);
            localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
            
            appendSingleMessageUI(localEnvelope);
            scrollToChatBottom();
            evaluateControlIcons();

            // P2P transmission
            if (peerInstance) {
                const conn = peerInstance.connect(selectedPeerID, { reliable: true });
                conn.on('open', () => {
                    conn.send(finalPayload);
                });
            }
            populateConversationsGrid();
        }

        function triggerVoiceCapture() {
            if (micRecorderObj && micRecorderObj.state === "recording") {
                finalizeAndSendVoiceNote();
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                globalAudioStreamRef = stream;
                micRecorderObj = new MediaRecorder(stream);
                capturedChunks = [];
                
                micRecorderObj.ondataavailable = e => capturedChunks.push(e.data);
                
                micRecorderObj.onstop = () => {
                    const audioBlob = new Blob(capturedChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64Audio = reader.result;
                        
                        const voicePayload = {
                            senderPhone: activeProfile.phone,
                            senderName: activeProfile.name,
                            content: base64Audio,
                            type: "voice",
                            timestamp: Date.now()
                        };

                        const envelope = { ...voicePayload, threadOwner: selectedPhone };
                        globalHistory.push(envelope);
                        localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
                        
                        appendSingleMessageUI(envelope);
                        scrollToChatBottom();

                        if (peerInstance) {
                            const conn = peerInstance.connect(selectedPeerID, { reliable: true });
                            conn.on('open', () => { conn.send(voicePayload); });
                        }
                        populateConversationsGrid();
                    };
                };

                micRecorderObj.start();
                document.getElementById("recording-panel").classList.remove("hidden");
                
                ticksCounter = 0;
                document.getElementById("recording-timer").innerText = "00:00";
                timerTracker = setInterval(() => {
                    ticksCounter++;
                    const m = String(Math.floor(ticksCounter / 60)).padStart(2, '0');
                    const s = String(ticksCounter % 60).padStart(2, '0');
                    document.getElementById("recording-timer").innerText = `${m}:${s}`;
                }, 1000);
            }).catch(() => {
                invokeDeviceToast("Access to local Microphone refused", true);
            });
        }

        function finalizeAndSendVoiceNote() {
            if (micRecorderObj) {
                micRecorderObj.stop();
                micRecorderObj = null;
            }
            if (globalAudioStreamRef) {
                globalAudioStreamRef.getTracks().forEach(t => t.stop());
            }
            clearInterval(timerTracker);
            document.getElementById("recording-panel").classList.add("hidden");
        }

        function discardVoiceNote() {
            if (micRecorderObj) {
                micRecorderObj.onstop = null; // Unbind recording execution
                micRecorderObj.stop();
                micRecorderObj = null;
            }
            if (globalAudioStreamRef) {
                globalAudioStreamRef.getTracks().forEach(t => t.stop());
            }
            clearInterval(timerTracker);
            document.getElementById("recording-panel").classList.add("hidden");
            invokeDeviceToast("Recording deleted", false);
        }

        function scrollToChatBottom() {
            const container = document.getElementById("message-container");
            setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
        }

        function clearCurrentChatLog() {
            if (!confirm("Remove this thread history permanently?")) return;
            globalHistory = globalHistory.filter(m => m.threadOwner !== selectedPhone);
            localStorage.setItem("mob_chat_logs", JSON.stringify(globalHistory));
            loadSelectedChatMessages();
            populateConversationsGrid();
        }

        function toggleBlockActiveStudent() {
            const index = globalBlocks.indexOf(selectedPeerID);
            const blockBtn = document.getElementById("block-icon-ui");
            
            if (index > -1) {
                globalBlocks.splice(index, 1);
                blockBtn.className = "p-2 text-gray-500 dark:text-gray-300 text-xs";
                invokeDeviceToast("Student pipeline restored", false);
            } else {
                globalBlocks.push(selectedPeerID);
                blockBtn.className = "p-2 text-red-500 text-xs";
                invokeDeviceToast("Student pipeline frozen", true);
            }
            localStorage.setItem("mob_blocked_nodes", JSON.stringify(globalBlocks));
            launchMobileThread(selectedPhone, selectedPeerID, selectedName);
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle("dark");
        }

        function logoutUser() {
            if (!confirm("Log out from local profile? (All offline logs will persist)")) return;
            localStorage.removeItem("mob_active_profile");
            activeProfile = null;
            if (peerInstance) {
                peerInstance.destroy();
                peerInstance = null;
            }
            document.getElementById("auth-screen").classList.remove("hidden");
        }

        function invokeDeviceToast(text, isAlert) {
            const toast = document.getElementById("mobile-toast");
            const box = document.getElementById("toast-text-box");
            const icon = document.getElementById("toast-icon-box");

            box.innerText = text;
            if (isAlert) {
                icon.className = "fa-solid fa-triangle-exclamation text-rose-500";
            } else {
                icon.className = "fa-solid fa-circle-check text-emerald-500";
            }

            toast.classList.remove("hidden");
            setTimeout(() => { toast.classList.add("hidden"); }, 3000);
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
